# Observability stack — Prometheus, Grafana, Loki, Promtail
# Usage: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

name: ourfamroots-dev

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "7007:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    ports:
      - "7008:9093"
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_SERVER_ROOT_URL:         ${GRAFANA_ROOT_URL:-http://localhost:7009}
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_INSTALL_PLUGINS:         grafana-piechart-panel
    ports:
      - "7009:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "7010:3100"
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Postgres exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/${POSTGRES_DB:-ourfamroots}?sslmode=disable"
    ports:
      - "7011:9187"

  # Redis exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.60.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis://redis:6379}
    ports:
      - "7012:9121"

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
