global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: production
    app: ourfamroots

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI — scrapes /metrics (prometheus-fastapi-instrumentator)
  - job_name: api
    dns_sd_configs:
      - names: ["api"]
        type: A
        port: 8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Celery — scraped via celery-exporter sidecar or Flower
  - job_name: celery
    static_configs:
      - targets: ["worker:9808"]

  # PostgreSQL exporter
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis exporter
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Nginx (frontend container — stub_status module)
  - job_name: nginx
    static_configs:
      - targets: ["frontend:9113"]

  # Node exporter (if installed on host)
  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
