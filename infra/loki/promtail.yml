server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs via Docker socket
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as the job label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # Keep only ourfamroots containers (filter by compose project label)
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: ourfamroots.*
        action: keep
      # Add service name from compose label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Add slot label (blue/green) if present
      - source_labels: [__meta_docker_container_label_slot]
        target_label: slot
    pipeline_stages:
      # Parse JSON logs (FastAPI / uvicorn emit structured JSON)
      - json:
          expressions:
            level:    level
            message:  message
            request_id: request_id
            status:   status
            duration: duration
      - labels:
          level:
          service:
      # Drop debug logs in production to reduce volume
      - drop:
          expression: '.*level.*debug.*'
          drop_counter_reason: debug_log_dropped
