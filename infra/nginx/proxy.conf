# Reverse proxy — TLS termination + routing to internal services
#
# Routes:
#   /                → frontend  (port 8080)
#   /api/v1/         → backend   (port 8000)
#   /s3/             → minio     (port 9000)  — presigned URL downloads
#   /.well-known/    → certbot   webroot challenge

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;


# ── HTTP → HTTPS redirect + ACME challenge ───────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # TLS certificates — certbot writes here; fall back to self-signed on first boot
    ssl_certificate     /etc/letsencrypt/live/cert/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cert/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Request size limit (file uploads go through presigned URLs, not the API)
    client_max_body_size 10M;

    # ── API routes ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://api:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;

        # Buffering for API responses
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # Stricter rate limit on auth endpoints
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://api:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    location /api/v1/auth/oauth/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://api:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── Health check (for external monitors / uptime checks) ─────────────────
    location = /health {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://api:8000;
        proxy_pass $backend_upstream/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── MinIO / S3 presigned URLs ────────────────────────────────────────────
    location /s3/ {
        rewrite ^/s3/(.*) /$1 break;

        resolver 127.0.0.11 valid=10s ipv6=off;
        set $minio_upstream http://minio:9000;
        proxy_pass $minio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering off;
        proxy_request_buffering off;

        # Allow large file downloads
        proxy_read_timeout 300s;
    }

    # ── Frontend (SPA) ───────────────────────────────────────────────────────
    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $frontend_upstream http://frontend:8080;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}
