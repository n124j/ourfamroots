# API service — selector switches slot during blue/green deploy
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ourfamroots
  labels:
    app: api
spec:
  selector:
    app: api
    slot: blue      # patched by CI during blue/green switch
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
# Stable canary services (always point to specific slot for smoke tests)
apiVersion: v1
kind: Service
metadata:
  name: api-blue
  namespace: ourfamroots
spec:
  selector:
    app: api
    slot: blue
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api-green
  namespace: ourfamroots
spec:
  selector:
    app: api
    slot: green
  ports:
    - port: 80
      targetPort: 8000
---
