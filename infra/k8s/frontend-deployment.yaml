apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-blue
  namespace: ourfamroots
  labels:
    app: frontend
    slot: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      slot: blue
  template:
    metadata:
      labels:
        app: frontend
        slot: blue
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx user
      containers:
        - name: frontend
          image: ghcr.io/your-org/ourfamroots/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
