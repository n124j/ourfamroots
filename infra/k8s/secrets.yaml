# DO NOT commit real secrets — populate via CI or external secret manager
# Seal with: kubeseal --format yaml < secrets.yaml > sealed-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: ourfamroots-secrets
  namespace: ourfamroots
type: Opaque
stringData:
  DATABASE_URL:          "postgresql+asyncpg://postgres:CHANGE_ME@postgres:5432/ourfamroots"
  SYNC_DATABASE_URL:     "postgresql+psycopg2://postgres:CHANGE_ME@postgres:5432/ourfamroots"
  REDIS_PASSWORD:        "CHANGE_ME"
  JWT_SECRET:            "CHANGE_ME"
  S3_BUCKET:             "ourfamroots-prod"
  AWS_ACCESS_KEY_ID:     "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  CORS_ORIGINS:          '["https://ourfamroots.example.com"]'
  SENTRY_DSN:            "CHANGE_ME"
  DB_PASSWORD:           "CHANGE_ME"
