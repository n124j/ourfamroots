# Live traffic service — selector points to active slot
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ourfamroots.labels" . | nindent 4 }}
    app: api
spec:
  selector:
    app: api
    slot: {{ .Values.blueGreen.activeSlot }}
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
# Slot-pinned services for smoke tests
{{- range list "blue" "green" }}
apiVersion: v1
kind: Service
metadata:
  name: api-{{ . }}
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    app: api
    slot: {{ . }}
  ports:
    - port: 80
      targetPort: 8000
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ourfamroots.labels" . | nindent 4 }}
    app: frontend
spec:
  selector:
    app: frontend
    slot: {{ .Values.blueGreen.activeSlot }}
  ports:
    - name: http
      port: 80
      targetPort: 8080
