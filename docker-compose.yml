# Development stack — hot reload, mounted source, local DBs
# Usage: docker compose up -d
#
# All tuneable values are read from a .env file in this directory.
# Copy .env.example → .env and fill in the required fields before starting.

name: ourfamroots-dev

x-backend-env: &backend-env
    PYTHONPATH: /app
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/${POSTGRES_DB:-ourfamroots}
    SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ourfamroots}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
    ENVIRONMENT: ${ENVIRONMENT:-development}
    LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-ourfamroots-system}
    DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-}
    S3_BUCKET: ${S3_BUCKET:-ourfamroots-local}
    S3_REGION: ${S3_REGION:-us-east-1}
    S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
    S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:7002}
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
    CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:7006","http://localhost:7009"]}
    SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
    SMTP_PORT: ${SMTP_PORT:-587}
    SMTP_USER: ${SMTP_USER:?SMTP_USER must be set in .env}
    SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD must be set in .env}
    EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM must be set in .env}
    FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:7006}
    API_BASE_URL: ${API_BASE_URL:-http://localhost:7004}
    GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
    GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    DEBUG: ${DEBUG:-false}
    AUTO_VERIFY_EMAIL: ${AUTO_VERIFY_EMAIL:-true}
    SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}

services:
    # ── Database ──────────────────────────────────────────────────────────────
    db:
        image: postgres:15-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-ourfamroots}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
        ports:
            - '7000:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
            interval: 5s
            timeout: 3s
            retries: 10

    # ── Redis ─────────────────────────────────────────────────────────────────
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        ports:
            - '7001:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 10

    # ── MinIO (local S3) ──────────────────────────────────────────────────────
    minio:
        image: minio/minio:RELEASE.2024-05-01T01-11-10Z
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
        ports:
            - '7002:9000' # S3 API
            - '7003:9001' # Console
        volumes:
            - minio_data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 10s
            timeout: 5s
            retries: 5

    # MinIO bucket initializer (runs once, uses S3_BUCKET from env)
    minio-init:
        image: minio/mc:RELEASE.2024-05-09T17-04-24Z
        depends_on:
            minio:
                condition: service_healthy
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
            S3_BUCKET: ${S3_BUCKET:-ourfamroots-local}
        entrypoint: >
            /bin/sh -c "
              mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
              mc mb --ignore-existing local/$$S3_BUCKET;
              mc anonymous set download local/$$S3_BUCKET;
            "

    # ── Backend API ───────────────────────────────────────────────────────────
    api:
        build:
            context: ./backend
            target: runtime
        restart: unless-stopped
        environment: *backend-env
        ports:
            - '7004:8000'
        volumes:
            - ./backend:/app:cached # hot reload via watchfiles
        command: >
            uvicorn src.main:app
              --host 0.0.0.0
              --port 8000
              --reload
              --reload-dir src
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
            interval: 10s
            timeout: 5s
            retries: 5

    # ── Celery worker ─────────────────────────────────────────────────────────
    worker:
        build:
            context: ./backend
            target: runtime
        restart: unless-stopped
        environment: *backend-env
        volumes:
            - ./backend:/app:cached
        command: >
            celery -A src.infrastructure.media.celery_app worker
              --loglevel=debug
              --queues=media,default
              --concurrency=2
              --max-tasks-per-child=50
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

    # ── Celery Beat (periodic tasks, e.g. subscription expiry reminders) ──────
    beat:
        build:
            context: ./backend
            target: runtime
        restart: unless-stopped
        environment: *backend-env
        volumes:
            - ./backend:/app:cached
        command: celery -A src.infrastructure.media.celery_app beat --loglevel=info
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

    # ── Celery Flower (task monitor) ──────────────────────────────────────────
    flower:
        image: mher/flower:2.0
        restart: unless-stopped
        environment:
            CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
        ports:
            - '7005:5555'
        depends_on:
            - redis

    # ── DB migration runner (exits after completion) ───────────────────────────
    migrate:
        build:
            context: ./backend
            target: runtime
        environment: *backend-env
        command: alembic upgrade head
        volumes:
            - ./backend:/app:cached
        depends_on:
            db:
                condition: service_healthy
        restart: 'no'

    # ── Frontend (Vite dev server) ────────────────────────────────────────────
    frontend:
        image: node:20-alpine
        working_dir: /app
        restart: unless-stopped
        environment:
            VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:7004/api/v1}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
            GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
            VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
        ports:
            - '7006:5173'
        volumes:
            - ./frontend:/app:cached
            - /app/node_modules
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
    postgres_data:
    redis_data:
    minio_data:
