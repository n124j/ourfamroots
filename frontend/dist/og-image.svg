<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="50%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Tree icon -->
  <g transform="translate(540, 120)" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round">
    <circle cx="60" cy="30" r="18"/>
    <line x1="60" y1="48" x2="60" y2="80"/>
    <line x1="60" y1="80" x2="20" y2="120"/>
    <line x1="60" y1="80" x2="100" y2="120"/>
    <circle cx="20" cy="138" r="14"/>
    <circle cx="100" cy="138" r="14"/>
    <line x1="20" y1="152" x2="0" y2="180"/>
    <line x1="20" y1="152" x2="40" y2="180"/>
    <line x1="100" y1="152" x2="80" y2="180"/>
    <line x1="100" y1="152" x2="120" y2="180"/>
    <circle cx="0" cy="194" r="10"/>
    <circle cx="40" cy="194" r="10"/>
    <circle cx="80" cy="194" r="10"/>
    <circle cx="120" cy="194" r="10"/>
  </g>
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">FamilyRoots</text>
  <!-- Subtitle -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#c7d2fe">Build, Explore &amp; Share Your Family Tree</text>
  <!-- Badge -->
  <rect x="480" y="510" width="240" height="36" rx="18" fill="#22c55e" fill-opacity="0.2" stroke="#4ade80" stroke-opacity="0.4"/>
  <text x="600" y="534" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#86efac">Free during open beta</text>
</svg>
