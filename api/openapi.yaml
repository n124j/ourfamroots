      operationId: getFamilyGroup
      summary: Get a family group by ID
      responses:
        "200":
          description: Family group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Relationships]
      operationId: updateFamilyGroup
      summary: Update a family group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parent1Id:
                  type: string
                  format: uuid
                  nullable: true
                parent2Id:
                  type: string
                  format: uuid
                  nullable: true
                unionType:
                  $ref: "#/components/schemas/UnionType"
                isDivorced:
                  type: boolean
      responses:
        "200":
          description: Updated family group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Relationships]
      operationId: deleteFamilyGroup
      summary: Delete a family group
      description: EDITOR or ADMIN only. Removes the group and all member links; persons are not deleted.
      responses:
        "204":
          description: Family group deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/family-groups/{familyGroupId}/members:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/familyGroupId"
    post:
      tags: [Relationships]
      operationId: addFamilyMember
      summary: Add a person to a family group
      description: >
        CONTRIBUTOR or higher required.
        A family group can have at most 2 PARENT members.
        CHILD members are unlimited.
        parentageType is required for CHILD role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFamilyMemberRequest"
      responses:
        "200":
          description: Member added — returns updated family group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "409":
          description: Person already in this family group, or parent slots are full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trees/{treeId}/family-groups/{familyGroupId}/members/{personId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/familyGroupId"
      - $ref: "#/components/parameters/personId"
    delete:
      tags: [Relationships]
      operationId: removeFamilyMember
      summary: Remove a person from a family group
      responses:
        "200":
          description: Member removed — returns updated family group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Relationships]
      operationId: updateFamilyMember
      summary: Update a member's parentage type or birth order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentageType:
                  $ref: "#/components/schemas/ParentageType"
                birthOrder:
                  type: integer
                  minimum: 1
                  nullable: true
      responses:
        "200":
          description: Updated — returns updated family group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/relationships:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Relationships]
      operationId: listRelationships
      summary: List non-family-group relationships in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: personId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter relationships involving this person
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/RelationshipType"
      responses:
        "200":
          description: List of relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Relationship"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Relationships]
      operationId: createRelationship
      summary: Create a non-family-group relationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRelationshipRequest"
      responses:
        "201":
          description: Relationship created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Relationship"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "409":
          description: This relationship pair already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trees/{treeId}/relationships/{relationshipId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - name: relationshipId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Relationships]
      operationId: deleteRelationship
      summary: Delete a relationship
      responses:
        "204":
          description: Relationship deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  # ============================================================
  # EVENTS
  # ============================================================

  /trees/{treeId}/events:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Events]
      operationId: listEvents
      summary: List events in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: personId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter events for a specific person
        - name: familyGroupId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter events for a specific family group
        - name: eventType
          in: query
          schema:
            $ref: "#/components/schemas/EventType"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Events]
      operationId: createEvent
      summary: Create a life event
      description: >
        Requires CONTRIBUTOR or higher.
        Exactly one of personId or familyGroupId must be provided.
        Provide either placeId (existing place) or newPlace (creates a new place record).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /trees/{treeId}/events/{eventId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/eventId"
    get:
      tags: [Events]
      operationId: getEvent
      summary: Get an event by ID
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Events]
      operationId: updateEvent
      summary: Update an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                eventDate:
                  type: string
                  format: date
                  nullable: true
                eventDateQualifier:
                  $ref: "#/components/schemas/EventDateQualifier"
                eventDateRangeEnd:
                  type: string
                  format: date
                  nullable: true
                eventDateOriginal:
                  type: string
                  nullable: true
                placeId:
                  type: string
                  format: uuid
                  nullable: true
                description:
                  type: string
                  maxLength: 5000
                  nullable: true
                confidenceLevel:
                  $ref: "#/components/schemas/ConfidenceLevel"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Events]
      operationId: deleteEvent
      summary: Delete an event
      description: EDITOR or ADMIN only
      responses:
        "204":
          description: Event deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  # ============================================================
  # PLACES
  # ============================================================

  /places:
    get:
      tags: [Places]
      operationId: listPlaces
      summary: List places known to this tenant
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: q
          in: query
          schema:
            type: string
          description: Fuzzy name search
        - name: countryCode
          in: query
          schema:
            type: string
            pattern: "^[A-Z]{2}$"
      responses:
        "200":
          description: Paginated places
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Place"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"

    post:
      tags: [Places]
      operationId: createPlace
      summary: Create a new place
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaceRequest"
      responses:
        "201":
          description: Place created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  # ============================================================
  # MEDIA (Photos & Documents)
  # ============================================================

  /trees/{treeId}/media:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Media]
      operationId: listMedia
      summary: List media items in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: mediaType
          in: query
          schema:
            $ref: "#/components/schemas/MediaType"
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PROCESSING, READY, FAILED]
      responses:
        "200":
          description: Paginated media items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Media"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Media]
      operationId: requestMediaUpload
      summary: Request a pre-signed upload URL for a media file
      description: >
        Two-step upload flow:
        1. POST here to receive a pre-signed S3 PUT URL and a mediaId.
        2. PUT the file binary directly to the S3 URL (client-to-S3, no API proxy).
        3. The media record transitions from PENDING → PROCESSING → READY automatically.
        Poll GET /trees/{treeId}/media/{mediaId} to check status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaUploadRequest"
      responses:
        "201":
          description: Pre-signed URL issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaUploadResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "413":
          description: File size exceeds plan limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trees/{treeId}/media/{mediaId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/mediaId"
    get:
      tags: [Media]
      operationId: getMedia
      summary: Get a media item by ID
      responses:
        "200":
          description: Media item detail with signed URLs for original and variants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Media"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Media]
      operationId: updateMedia
      summary: Update media metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                originalFilename:
                  type: string
                  maxLength: 255
      responses:
        "200":
          description: Updated media item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Media"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Media]
      operationId: deleteMedia
      summary: Soft-delete a media item
      description: Marks the record as DELETED; S3 object is removed by a background job
      responses:
        "204":
          description: Media deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/media/{mediaId}/attachments:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/mediaId"
    get:
      tags: [Media]
      operationId: listAttachments
      summary: List all entity attachments for a media item
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaAttachment"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Media]
      operationId: createAttachment
      summary: Attach a media item to a person, family group, event, or tree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentRequest"
      responses:
        "201":
          description: Attachment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAttachment"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "409":
          description: Already attached to this entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trees/{treeId}/media/{mediaId}/attachments/{attachmentId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/mediaId"
      - name: attachmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Media]
      operationId: updateAttachment
      summary: Update attachment caption or face region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                caption:
                  type: string
                  maxLength: 1000
                  nullable: true
                faceRegion:
                  type: object
                  nullable: true
                  properties:
                    x:
                      type: number
                      format: float
                      minimum: 0
                      maximum: 1
                    y:
                      type: number
                      format: float
                      minimum: 0
                      maximum: 1
                    width:
                      type: number
                      format: float
                      minimum: 0
                      maximum: 1
                    height:
                      type: number
                      format: float
                      minimum: 0
                      maximum: 1
      responses:
        "200":
          description: Updated attachment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAttachment"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Media]
      operationId: deleteAttachment
      summary: Remove an entity attachment (does not delete the media file)
      responses:
        "204":
          description: Attachment removed
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  # ============================================================
  # SEARCH
  # ============================================================

  /search/persons:
    get:
      tags: [Search]
      operationId: searchPersons
      summary: Full-text and fuzzy person search within the caller's trees
      description: >
        Searches across all trees the calling user has access to.
        Accepts a free-form query (full-text + trigram fuzzy) and optional structured filters.
        Persons marked PRIVATE are excluded unless the caller is an ADMIN or the tree owner.
        Living persons have their birth details redacted in results unless privacyLevel is PUBLIC.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 200
          description: >
            Search query — matched against given name, surname, nickname, full name.
            Supports fuzzy matching (typo-tolerant).
        - name: treeId
          in: query
          schema:
            type: string
            format: uuid
          description: Limit search to a specific tree
        - name: sex
          in: query
          schema:
            $ref: "#/components/schemas/PersonSex"
        - name: birthYearFrom
          in: query
          schema:
            type: integer
        - name: birthYearTo
          in: query
          schema:
            type: integer
        - name: deathYearFrom
          in: query
          schema:
            type: integer
        - name: deathYearTo
          in: query
          schema:
            type: integer
        - name: birthPlace
          in: query
          schema:
            type: string
          description: Fuzzy place name filter on birth event
        - name: isLiving
          in: query
          schema:
            type: boolean
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Search results ranked by relevance
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination, query]
                properties:
                  query:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PersonSearchResult"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "400":
          description: Query too short or malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /search/places:
    get:
      tags: [Search]
      operationId: searchPlaces
      summary: Fuzzy place name search with optional geo-bias
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: countryCode
          in: query
          schema:
            type: string
            pattern: "^[A-Z]{2}$"
        - name: latitude
          in: query
          schema:
            type: number
            format: double
          description: Geo-bias centre latitude
        - name: longitude
          in: query
          schema:
            type: number
            format: double
          description: Geo-bias centre longitude
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Matching places
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Place"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /search/global:
    get:
      tags: [Search]
      operationId: globalSearch
      summary: Cross-entity global search (persons, trees, places, events)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 200
        - name: types
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [person, tree, place, event]
            default: [person, tree, place]
          style: form
          explode: false
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Global search results grouped by entity type
          content:
            application/json:
              schema:
                type: object
                properties:
                  persons:
                    type: array
                    items:
                      $ref: "#/components/schemas/PersonSearchResult"
                  trees:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tree"
                  places:
                    type: array
                    items:
                      $ref: "#/components/schemas/Place"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  # ============================================================
  # HEALTH / META
  # ============================================================

  /health:
    get:
      tags: []
      operationId: healthCheck
      summary: API health check
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  version:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        "503":
          description: API is unhealthy

  # ============================================================
  # ADMIN — User management (ADMIN app_role required)
  # ============================================================

  /admin/users:
    get:
      tags: [Admin]
      operationId: listUsers
      summary: List all users in the tenant
      description: |
        Returns a paginated list of all users in the caller's tenant.
        Requires `ADMIN` app role with a verified email address.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 25 }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
          description: Search by name or email (case-insensitive)
        - name: app_role
          in: query
          schema:
            type: string
            enum: [ADMIN, STANDARD, AUDITOR]
        - name: verified
          in: query
          schema: { type: boolean }
          description: Filter by email verification status
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at_desc, created_at_asc, name_asc, email_asc, last_login_desc]
            default: created_at_desc
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                required: [total, items, page, page_size, total_pages]
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Admin]
      operationId: createUser
      summary: Create a new user and send an activation email
      description: |
        Creates a user in the tenant with a random unusable password.
        Sends an activation email containing a link to `POST /auth/reset-password`
        where the user sets their own password.

        **Side effects:**
        - Activation email sent immediately.
        - Activity log entry created: `event_type = ADMIN_CREATE`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, given_name]
              properties:
                email:
                  type: string
                  format: email
                given_name:
                  type: string
                  minLength: 1
                  maxLength: 100
                family_name:
                  type: string
                  maxLength: 100
                  default: ""
                app_role:
                  type: string
                  enum: [ADMIN, STANDARD, AUDITOR]
                  default: STANDARD
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "409":
          description: Email already exists in tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    patch:
      tags: [Admin]
      operationId: updateUser
      summary: Update a user's profile, role, or verification status
      description: |
        Partial update — all body fields are optional.

        **Verification change side effects:**
        - `email_verified = true` → sends "account verified" email, logs `ADMIN_VERIFY`.
        - `email_verified = false` → sends "verification removed" email, logs `ADMIN_UNVERIFY`.

        **Activation/deactivation via this endpoint:**
        - `is_active = true` → logs `ADMIN_ACTIVATE`.
        - `is_active = false` → logs `ADMIN_DEACTIVATE`.
        - Name/role-only changes → logs `ADMIN_UPDATE`.

        **Self-protection** (when `userId` equals the caller's own ID):
        - Cannot change own `app_role` away from `ADMIN` → `400`.
        - Cannot set own `is_active = false` → `400`.
        - Cannot set own `email_verified = false` → `400`.
        - Name changes are always allowed.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                given_name:
                  type: string
                  maxLength: 100
                  nullable: true
                family_name:
                  type: string
                  maxLength: 100
                  nullable: true
                app_role:
                  type: string
                  enum: [ADMIN, STANDARD, AUDITOR]
                is_active:
                  type: boolean
                email_verified:
                  type: boolean
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: |
            Self-protection rule violated (e.g. cannot change own role or
            deactivate own account).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Admin]
      operationId: deactivateUser
      summary: Deactivate (soft-delete) a user
      description: |
        Sets `is_active = false` and immediately revokes all of the user's
        active refresh tokens (forcing sign-out on all devices).

        **Side effects:**
        - "Your account has been deactivated" email sent to the user.
        - Activity log entry created: `event_type = ADMIN_DEACTIVATE`.

        **Self-protection:** Cannot deactivate your own account → `400`.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: User deactivated — no body
        "400":
          description: Cannot deactivate your own account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/users/{userId}/verify:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Admin]
      operationId: adminVerifyUser
      summary: Manually verify a user's email address
      description: |
        Marks `email_verified = true` without requiring the user to click an
        email link.

        **Side effects:**
        - "Your account is verified" email sent with a sign-in link.
        - Activity log entry created: `event_type = ADMIN_VERIFY`.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/users/{userId}/purge:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Admin]
      operationId: purgeUser
      summary: Permanently delete a deactivated user (Super Admin only)
      description: |
        Hard-deletes the user row. Unlike `DELETE /admin/users/{userId}`
        (deactivate), this is irreversible — the account cannot be
        recovered afterwards.

        **Requires `SUPER_ADMIN` app role** — a regular `ADMIN` gets `403`.

        **Preconditions:**
        - The target user must already be deactivated (`is_active = false`).
          Purging an active account → `400`. Deactivate first via
          `DELETE /admin/users/{userId}` or `PATCH /admin/users/{userId}`.
        - Cannot purge your own account → `400`.

        **Side effects:**
        - All of the user's refresh tokens/sessions are revoked.
        - Activity log entry created: `event_type = ADMIN_DELETE`, recorded
          against the acting Super Admin and identifying the deleted user's
          email, role, and id — this entry is retained after the user row
          is gone (it does not cascade-delete).
      security:
        - BearerAuth: []
      responses:
        "204":
          description: User permanently deleted — no body
        "400":
          description: >
            Either the target account is still active (must be deactivated
            first), or the caller tried to purge their own account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: Caller is not a Super Admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/merge:
    post:
      tags: [Trees]
      operationId: mergeTrees
      summary: Merge multiple family trees into one new tree
      description: |
        **Admin only.** Creates a new family tree by merging two or more existing
        trees. Each source tree contributes a "pivot person" — a real-world person
        who appears in multiple trees. All pivot persons are collapsed into a single
        person in the resulting tree; every other person is copied with a new ID.

        Family groups are rewritten to use the new person IDs. Photo URL references
        are preserved. The calling admin becomes OWNER of the merged tree; source
        trees are left untouched.

        A `MERGE_TREES` audit log entry is written to the new tree.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_tree_name, sources]
              properties:
                new_tree_name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: Combined Shah Family
                new_tree_description:
                  type: string
                  maxLength: 1000
                  nullable: true
                sources:
                  type: array
                  minItems: 2
                  description: At least two source trees with their pivot persons.
                  items:
                    type: object
                    required: [tree_id, pivot_person_id]
                    properties:
                      tree_id:
                        type: string
                        format: uuid
                      pivot_person_id:
                        type: string
                        format: uuid
                        description: ID of the person in this tree who represents the shared real-world ancestor.
      responses:
        "201":
          description: Merged tree created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tree_id:    { type: string, format: uuid }
                  tree_name:  { type: string }
                  person_count: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          description: One of the source trees or pivot persons was not found
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/trees/{treeId}/persons:
    parameters:
      - name: treeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Tree whose persons to list
    get:
      tags: [Admin]
      operationId: adminListTreePersons
      summary: List persons in a tree (for admin tooling)
      description: |
        Returns a lightweight list of all non-deleted persons in the given tree,
        scoped to the admin's tenant. Intended for dropdown / picker UIs such as
        the "Merge Trees" pivot-person selector in the Admin Dashboard.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Person list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:                   { type: string, format: uuid }
                    display_given_name:   { type: string }
                    display_surname:      { type: string }
                    photo_url:            { type: string, nullable: true }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

