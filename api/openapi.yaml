        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Trees]
      operationId: removeCollaborator
      summary: Remove a collaborator from a tree
      description: ADMIN or owner only (a user can also remove themselves)
      responses:
        "204":
          description: Collaborator removed
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/invitations:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Trees]
      operationId: listInvitations
      summary: List pending invitations for a tree
      responses:
        "200":
          description: Invitations list
