      responses:
        "200":
          description: Import job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJob"
        "404":
          $ref: "#/components/responses/404NotFound"


  # ── .frt native backup import ─────────────────────────────────
  /trees/import:
    post:
      tags: [Trees]
      operationId: importFrtTree
      summary: Import a .frt backup file as a new tree
      description: |
        Creates a new tree from a OurFamRoots .frt backup file. All persons are
        re-created with new UUIDs. Imported fields include life dates (birth_date,
        death_date, birth_year, death_year), social handles (facebook_handle,
        x_handle, linkedin_handle), and family group custom labels.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrtBackup"
      responses:
        "201":
          description: Tree imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  tree_id:
                    type: string
                    format: uuid
                  tree_name:
                    type: string
                  person_count:
                    type: integer
                  family_group_count:
                    type: integer
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /trees/{treeId}/export-log:
    post:
      tags: [Trees]
      operationId: logTreeExport
      summary: Record a tree export event in the audit log
      parameters:
        - $ref: "#/components/parameters/treeId"
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Export event logged
        "401":
          $ref: "#/components/responses/401Unauthorized"

  # ============================================================
  # PERSONS
  # ============================================================

  /trees/{treeId}/persons:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Persons]
      operationId: listPersons
      summary: List persons in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: surname
          in: query
          schema:
            type: string
          description: Filter by surname (prefix match)
        - name: sex
          in: query
          schema:
            $ref: "#/components/schemas/PersonSex"
        - name: isLiving
          in: query
          schema:
            type: boolean
        - name: orderBy
          in: query
          schema:
            type: string
            enum: [surname, givenName, createdAt, updatedAt]
            default: surname
      responses:
        "200":
          description: Paginated list of persons
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PersonSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Persons]
      operationId: createPerson
      summary: Create a new person in a tree
      description: Requires CONTRIBUTOR, EDITOR, or ADMIN role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonRequest"
      responses:
        "201":
          description: Person created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /trees/{treeId}/persons/{personId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/personId"
    get:
      tags: [Persons]
      operationId: getPerson
      summary: Get a person by ID
      parameters:
        - name: include
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [names, events, media, sources, familyGroups]
          style: form
          explode: false
          description: Comma-separated list of related resources to embed in the response
      responses:
        "200":
          description: Person detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Persons]
      operationId: updatePerson
      summary: Update a person's attributes
      description: >
        Requires CONTRIBUTOR, EDITOR, or ADMIN role.
        The `version` field must match the current server version (optimistic locking).
        On conflict, the server returns 409 with the current version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePersonRequest"
      responses:
        "200":
          description: Updated person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "409":
          description: Version conflict — another edit was saved concurrently
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Error"
                  - type: object
                    properties:
                      currentVersion:
                        type: integer
                        description: The version currently on the server

    delete:
      tags: [Persons]
      operationId: deletePerson
      summary: Soft-delete a person
      description: >
        Sets is_deleted=true. Person remains in version_history.
        Requires EDITOR or ADMIN role.
      responses:
        "204":
          description: Person soft-deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/persons/{personId}/restore:
    post:
      tags: [Persons]
      operationId: restorePerson
      summary: Restore a soft-deleted person
      parameters:
        - $ref: "#/components/parameters/treeId"
        - $ref: "#/components/parameters/personId"
      responses:
        "200":
          description: Person restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/persons/{personId}/names:
