                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PersonSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Persons]
      operationId: createPerson
      summary: Create a new person in a tree
      description: Requires CONTRIBUTOR, EDITOR, or ADMIN role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonRequest"
      responses:
        "201":
          description: Person created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /trees/{treeId}/persons/{personId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/personId"
    get:
      tags: [Persons]
      operationId: getPerson
      summary: Get a person by ID
      parameters:
        - name: include
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [names, events, media, sources, familyGroups]
          style: form
          explode: false
          description: Comma-separated list of related resources to embed in the response
      responses:
        "200":
          description: Person detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Persons]
      operationId: updatePerson
      summary: Update a person's attributes
      description: >
        Requires CONTRIBUTOR, EDITOR, or ADMIN role.
        The `version` field must match the current server version (optimistic locking).
        On conflict, the server returns 409 with the current version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePersonRequest"
      responses:
        "200":
          description: Updated person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "409":
          description: Version conflict — another edit was saved concurrently
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Error"
                  - type: object
                    properties:
                      currentVersion:
                        type: integer
                        description: The version currently on the server

    delete:
      tags: [Persons]
      operationId: deletePerson
      summary: Soft-delete a person
      description: >
        Sets is_deleted=true. Person remains in version_history.
        Requires EDITOR or ADMIN role.
      responses:
        "204":
          description: Person soft-deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/persons/{personId}/restore:
    post:
      tags: [Persons]
      operationId: restorePerson
      summary: Restore a soft-deleted person
      parameters:
        - $ref: "#/components/parameters/treeId"
        - $ref: "#/components/parameters/personId"
      responses:
        "200":
          description: Person restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/persons/{personId}/names:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/personId"
    get:
      tags: [Persons]
      operationId: listPersonNames
      summary: List all names for a person
      responses:
        "200":
          description: Person names
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PersonName"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Persons]
      operationId: addPersonName
      summary: Add a name to a person
      description: >
        Requires CONTRIBUTOR or higher role.
        If isPrimary=true, the current primary name is demoted automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonNameInput"
      responses:
        "201":
          description: Name added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonName"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /trees/{treeId}/persons/{personId}/names/{nameId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/personId"
      - name: nameId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Persons]
      operationId: updatePersonName
      summary: Update a person's name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonNameInput"
      responses:
        "200":
          description: Name updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonName"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Persons]
      operationId: deletePersonName
      summary: Delete a name record
      description: Cannot delete the only primary name
      responses:
        "204":
          description: Name deleted
        "400":
          description: Cannot delete the only primary name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/persons/{personId}/ancestors:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/personId"
    get:
      tags: [Persons]
      operationId: getAncestors
      summary: Get all ancestors of a person (unlimited generations)
      parameters:
        - name: maxDepth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: parentageTypes
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ParentageType"
          style: form
          explode: false
          description: "Filter by parentage type (default: all types)"
      responses:
        "200":
          description: Ancestor list ordered by depth
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AncestorNode"
                  subject:
                    $ref: "#/components/schemas/PersonSummary"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/persons/{personId}/descendants:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/personId"
    get:
      tags: [Persons]
      operationId: getDescendants
      summary: Get all descendants of a person (unlimited generations)
      parameters:
        - name: maxDepth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: parentageTypes
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ParentageType"
          style: form
          explode: false
      responses:
        "200":
          description: Descendant list ordered by depth
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AncestorNode"
                  subject:
                    $ref: "#/components/schemas/PersonSummary"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/persons/{personId}/history:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/personId"
    get:
      tags: [Persons]
      operationId: getPersonHistory
      summary: Get version history for a person
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Version history entries newest-first
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        version:
                          type: integer
                        snapshot:
                          $ref: "#/components/schemas/Person"
                        changedBy:
                          type: string
                          format: uuid
                          nullable: true
                        changedAt:
                          type: string
                          format: date-time
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  # ============================================================
  # RELATIONSHIPS
  # ============================================================

  /trees/{treeId}/family-groups:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Relationships]
      operationId: listFamilyGroups
      summary: List family groups in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: personId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter family groups containing this person (as parent or child)
      responses:
        "200":
          description: Paginated family groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FamilyGroup"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Relationships]
      operationId: createFamilyGroup
      summary: Create a family group
      description: Requires CONTRIBUTOR or higher role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyGroupRequest"
      responses:
        "201":
          description: Family group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /trees/{treeId}/family-groups/{familyGroupId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/familyGroupId"
    get:
      tags: [Relationships]
      operationId: getFamilyGroup
      summary: Get a family group by ID
      responses:
        "200":
          description: Family group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Relationships]
      operationId: updateFamilyGroup
      summary: Update a family group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parent1Id:
                  type: string
                  format: uuid
                  nullable: true
                parent2Id:
                  type: string
                  format: uuid
                  nullable: true
                unionType:
                  $ref: "#/components/schemas/UnionType"
                isDivorced:
                  type: boolean
      responses:
        "200":
          description: Updated family group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Relationships]
      operationId: deleteFamilyGroup
      summary: Delete a family group
      description: EDITOR or ADMIN only. Removes the group and all member links; persons are not deleted.
      responses:
        "204":
          description: Family group deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/family-groups/{familyGroupId}/members:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/familyGroupId"
    post:
      tags: [Relationships]
      operationId: addFamilyMember
      summary: Add a person to a family group
      description: >
        CONTRIBUTOR or higher required.
        A family group can have at most 2 PARENT members.
        CHILD members are unlimited.
        parentageType is required for CHILD role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFamilyMemberRequest"
      responses:
        "200":
          description: Member added — returns updated family group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "409":
          description: Person already in this family group, or parent slots are full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trees/{treeId}/family-groups/{familyGroupId}/members/{personId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/familyGroupId"
      - $ref: "#/components/parameters/personId"
    delete:
      tags: [Relationships]
      operationId: removeFamilyMember
      summary: Remove a person from a family group
      responses:
        "200":
          description: Member removed — returns updated family group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Relationships]
      operationId: updateFamilyMember
      summary: Update a member's parentage type or birth order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentageType:
                  $ref: "#/components/schemas/ParentageType"
                birthOrder:
                  type: integer
                  minimum: 1
                  nullable: true
      responses:
        "200":
          description: Updated — returns updated family group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/relationships:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Relationships]
      operationId: listRelationships
      summary: List non-family-group relationships in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: personId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter relationships involving this person
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/RelationshipType"
      responses:
        "200":
          description: List of relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Relationship"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Relationships]
      operationId: createRelationship
      summary: Create a non-family-group relationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRelationshipRequest"
      responses:
        "201":
          description: Relationship created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Relationship"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "409":
          description: This relationship pair already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trees/{treeId}/relationships/{relationshipId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - name: relationshipId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Relationships]
      operationId: deleteRelationship
      summary: Delete a relationship
      responses:
        "204":
          description: Relationship deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  # ============================================================
  # EVENTS
  # ============================================================

  /trees/{treeId}/events:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Events]
      operationId: listEvents
      summary: List events in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: personId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter events for a specific person
        - name: familyGroupId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter events for a specific family group
        - name: eventType
          in: query
          schema:
            $ref: "#/components/schemas/EventType"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Events]
      operationId: createEvent
      summary: Create a life event
      description: >
        Requires CONTRIBUTOR or higher.
        Exactly one of personId or familyGroupId must be provided.
        Provide either placeId (existing place) or newPlace (creates a new place record).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /trees/{treeId}/events/{eventId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/eventId"
    get:
      tags: [Events]
      operationId: getEvent
      summary: Get an event by ID
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Events]
      operationId: updateEvent
      summary: Update an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                eventDate:
                  type: string
                  format: date
                  nullable: true
                eventDateQualifier:
                  $ref: "#/components/schemas/EventDateQualifier"
                eventDateRangeEnd:
                  type: string
                  format: date
                  nullable: true
                eventDateOriginal:
                  type: string
                  nullable: true
                placeId:
                  type: string
                  format: uuid
                  nullable: true
                description:
                  type: string
                  maxLength: 5000
                  nullable: true
                confidenceLevel:
                  $ref: "#/components/schemas/ConfidenceLevel"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Events]
      operationId: deleteEvent
      summary: Delete an event
      description: EDITOR or ADMIN only
      responses:
        "204":
          description: Event deleted
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  # ============================================================
  # PLACES
  # ============================================================

  /places:
    get:
      tags: [Places]
      operationId: listPlaces
      summary: List places known to this tenant
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: q
          in: query
          schema:
            type: string
          description: Fuzzy name search
        - name: countryCode
          in: query
          schema:
            type: string
            pattern: "^[A-Z]{2}$"
      responses:
        "200":
          description: Paginated places
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Place"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"

    post:
      tags: [Places]
      operationId: createPlace
      summary: Create a new place
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaceRequest"
      responses:
        "201":
          description: Place created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  # ============================================================
  # MEDIA (Photos & Documents)
  # ============================================================

  /trees/{treeId}/media:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Media]
      operationId: listMedia
      summary: List media items in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: mediaType
          in: query
          schema:
            $ref: "#/components/schemas/MediaType"
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PROCESSING, READY, FAILED]
      responses:
        "200":
          description: Paginated media items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Media"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Media]
      operationId: requestMediaUpload
      summary: Request a pre-signed upload URL for a media file
      description: >
        Two-step upload flow:
        1. POST here to receive a pre-signed S3 PUT URL and a mediaId.
        2. PUT the file binary directly to the S3 URL (client-to-S3, no API proxy).
        3. The media record transitions from PENDING → PROCESSING → READY automatically.
        Poll GET /trees/{treeId}/media/{mediaId} to check status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaUploadRequest"
      responses:
        "201":
