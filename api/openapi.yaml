                      $ref: "#/components/schemas/Invitation"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Trees]
      operationId: sendInvitation
      summary: Send an invitation to collaborate on a tree
