            schema:
              type: object
              required: [name, permission_level]
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
                description: { type: string, maxLength: 500, nullable: true }
                permission_level:
                  type: string
                  enum: [VISIBLE, READ, READ_WRITE]
      responses:
        "201":
          description: Permission group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionGroup"
        "409":
          description: A permission group with this name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/permission-groups/{groupId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Admin, Permission Groups]
      operationId: updatePermissionGroup
      summary: Update a permission group
      description: |
        Requires `ADMIN` app role. All body fields are optional.

        **Side effects:** changing `permission_level` propagates the new
        tree role to every existing (member, tree) pair in the group (or to
        every tenant user's tree_members row, if the group `is_global`) —
        `OWNER`/`ADMIN` tree roles are never touched.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
                description: { type: string, maxLength: 500, nullable: true }
                permission_level:
                  type: string
                  enum: [VISIBLE, READ, READ_WRITE]
      responses:
        "200":
          description: Updated permission group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Admin, Permission Groups]
      operationId: deletePermissionGroup
      summary: Delete a permission group and revoke all its access grants
      description: |
        Requires `ADMIN` app role.

        **Side effects:** revokes every `VIEWER`/`EDITOR` tree_members row
        this group was granting (tenant-wide if `is_global`) before deleting
        the group.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Permission group deleted — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/permission-groups/{groupId}/global:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Admin, Permission Groups]
      operationId: setPermissionGroupGlobal
      summary: Make a permission group's trees globally accessible to every tenant user (Super Admin only)
      description: |
        Requires `SUPER_ADMIN` app role.

        **Side effects:**
        - Turning on: inserts `tree_members` rows for every (tree, tenant
          user) pair in the group, upgrading existing `VIEWER` rows to
          `EDITOR` if the group grants `EDITOR` — never downgrades.
        - Turning off: revokes access for tenant users who aren't also
          explicit members of the group (explicit members keep their access).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_global]
              properties:
                is_global: { type: boolean }
      responses:
        "200":
          description: Updated permission group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/permission-groups/{groupId}/trees:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Admin, Permission Groups]
      operationId: listPermissionGroupTrees
      summary: List trees in a permission group
      description: Requires `ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Trees in the group
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionGroupTree"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Admin, Permission Groups]
      operationId: addPermissionGroupTree
      summary: Add a tree to a permission group
      description: |
        Requires `ADMIN` app role. The tree must exist (and not be deleted)
        in the caller's tenant; a non-`AUDITOR` caller must also be a member
        of the tree.

        **Side effects:** grants access to every current recipient — the
        group's explicit members plus everyone in any linked user group, or
        every tenant user if the group `is_global`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tree_id]
              properties:
                tree_id: { type: string, format: uuid }
      responses:
        "201":
          description: Tree added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionGroupTree"
        "403":
          description: Caller is not a member of this tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Permission group not found, or tree not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: This tree is already in the group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/permission-groups/{groupId}/trees/{treeId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/treeId"
    delete:
      tags: [Admin, Permission Groups]
      operationId: removePermissionGroupTree
      summary: Remove a tree from a permission group
      description: |
        Requires `ADMIN` app role.

        **Side effects:** revokes access for every current recipient of this
        tree (tenant-wide if the group `is_global`).
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Tree removed from group — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/permission-groups/{groupId}/members:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Admin, Permission Groups]
      operationId: listPermissionGroupMembers
      summary: List members of a permission group
      description: Requires `ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Group members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupMember"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Admin, Permission Groups]
      operationId: addPermissionGroupMember
      summary: Add a user to a permission group
      description: |
        Requires `ADMIN` app role. The user must belong to the caller's
        tenant. Rejected with `400` if the group `is_global` — global groups
        apply to all tenant users automatically, so individuals cannot be
        added.

        **Side effects:** grants the user access to every tree in the group.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: string, format: uuid }
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"
        "400":
          description: Global groups apply to all members automatically
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Permission group not found, or user not found in this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User is already in this group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/permission-groups/{groupId}/members/{memberId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: memberId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Admin, Permission Groups]
      operationId: removePermissionGroupMember
      summary: Remove a user from a permission group
      description: |
        Requires `ADMIN` app role.

        **Side effects:** revokes the user's access to every tree in the group.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Member removed — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/permission-groups/{groupId}/user-groups:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Admin, Permission Groups]
      operationId: listPermissionGroupUserGroups
      summary: List user groups linked to a permission group
      description: Requires `ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Linked user groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionGroupUserGroupLink"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Admin, Permission Groups]
      operationId: addPermissionGroupUserGroup
      summary: Link a user group to a permission group — grants access to all its current and future members
      description: |
        Requires `ADMIN` app role.

        **Side effects:** immediately grants access to all current members
        of the user group, for every tree in this permission group. Future
        members of the user group inherit this access automatically.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_group_id]
              properties:
                user_group_id: { type: string, format: uuid }
      responses:
        "201":
          description: User group linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionGroupUserGroupLink"
        "404":
          description: Permission group not found, or user group not found in this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: This user group is already linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/permission-groups/{groupId}/user-groups/{linkId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: linkId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Admin, Permission Groups]
      operationId: removePermissionGroupUserGroup
      summary: Unlink a user group from a permission group
      description: |
        Requires `ADMIN` app role.

        **Side effects:** for each of the user group's members, revokes tree
        access granted through this permission group unless they're still
        entitled through some other overlapping permission group.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: User group unlinked — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/trees:
    get:
      tags: [Admin, Permission Groups]
      operationId: listTenantTreesForAssignment
      summary: List trees in the tenant, paginated and searchable (for assignment dropdowns)
      description: |
        Requires `ADMIN` app role. An `AUDITOR` sees every non-deleted tree
        in the tenant; a regular `ADMIN` sees only trees they are a member of.
        Used to populate the tree picker when adding a tree to a permission group.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
      responses:
        "200":
          description: Paginated tree list
          content:
            application/json:
              schema:
                type: object
                required: [total, items, page, page_size, total_pages]
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TenantTree"
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

# ============================================================
# SUBSCRIPTIONS
# ============================================================

  /admin/subscriptions:
    get:
      tags: [Admin, Subscriptions]
      operationId: listSubscriptions
      summary: List all subscriptions in the tenant
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Subscriptions in the tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Admin, Subscriptions]
      operationId: createSubscription
      summary: Create a subscription
      description: Requires `SUPER_ADMIN` app role. `name` must be unique within the tenant.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, tier]
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
                tier:
                  type: string
                  enum: [FREE, PREMIUM_INDIVIDUAL, PREMIUM_TEAM]
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Null/omitted = never expires.
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "409":
          description: A subscription with this name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/subscriptions/available-filters:
    get:
      tags: [Admin, Subscriptions]
      operationId: listAvailableSubscriptionFilters
      summary: List all known filter keys that can be granted to a subscription
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Available filter keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableFilter"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

  /admin/subscriptions/{subId}:
    parameters:
      - name: subId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Admin, Subscriptions]
      operationId: updateSubscription
      summary: Update a subscription's name/tier
      description: |
        Requires `SUPER_ADMIN` app role. All body fields are optional, except
        that including `expires_at` at all (even as `null`) is what triggers
        an expiry change — this re-arms the expiry-reminder email whenever
        the expiry actually moves.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
                tier:
                  type: string
                  enum: [FREE, PREMIUM_INDIVIDUAL, PREMIUM_TEAM]
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Admin, Subscriptions]
      operationId: deleteSubscription
      summary: Delete a subscription
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Subscription deleted — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/subscriptions/{subId}/filters:
    parameters:
      - name: subId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Admin, Subscriptions]
      operationId: listSubscriptionFilters
      summary: List filters granted by a subscription
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Filters granted by this subscription
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionFilter"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Admin, Subscriptions]
      operationId: addSubscriptionFilter
      summary: Add a filter to a subscription
      description: Requires `SUPER_ADMIN` app role. `filter_key` must be one of the known available filter keys.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filter_key]
              properties:
                filter_key: { type: string, minLength: 1, maxLength: 50 }
      responses:
        "201":
          description: Filter added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionFilter"
        "400":
          description: Unknown filter key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/404NotFound"
        "409":
          description: This filter is already in the subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/subscriptions/{subId}/filters/{filterKey}:
    parameters:
      - name: subId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: filterKey
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [Admin, Subscriptions]
      operationId: removeSubscriptionFilter
      summary: Remove a filter from a subscription
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Filter removed — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/subscriptions/{subId}/members:
    parameters:
      - name: subId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Admin, Subscriptions]
      operationId: listSubscriptionMembers
      summary: List members entitled by a subscription
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Subscription members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupMember"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Admin, Subscriptions]
      operationId: addSubscriptionMember
      summary: Add a user to a subscription
      description: |
        Requires `SUPER_ADMIN` app role. The user must belong to the
        caller's tenant. This is pure access-control metadata — adding a
        member has no side effects on `tree_members` (unlike Permission
        Groups).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: string, format: uuid }
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"
        "404":
          description: Subscription not found, or user not found in this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User is already in this subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/subscriptions/{subId}/members/{memberId}:
    parameters:
      - name: subId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: memberId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Admin, Subscriptions]
      operationId: removeSubscriptionMember
      summary: Remove a user from a subscription
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Member removed — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /subscriptions/my-filters:
    get:
      tags: [Subscriptions]
      operationId: getMySubscriptionFilters
      summary: List filter keys the current user is entitled to via their subscriptions
      description: |
        Requires a verified user account.

        A `SUPER_ADMIN` is opted out of the subscription model entirely —
        every gate-able filter key is always returned, regardless of any
        subscription membership. Other users get the distinct filter keys
        granted by every subscription they're a member of that hasn't
        expired.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Entitled filter keys
          content:
            application/json:
              schema:
                type: object
                required: [filterKeys]
                properties:
                  filterKeys:
                    type: array
                    items: { type: string }
        "401":
          $ref: "#/components/responses/401Unauthorized"

# ============================================================
# ACTIVITY
# ============================================================

  /activity:
    get:
      tags: [Activity]
      operationId: listActivity
      summary: Activity feed (admin/auditor only)
      description: |
        Requires `ADMIN`, `AUDITOR`, or `SUPER_ADMIN` app role → `403`
        otherwise. A plain `ADMIN` stays scoped to their own namespace;
        `AUDITOR` and `SUPER_ADMIN` see activity across every namespace by
        default, optionally narrowed with `namespace_id`.

        Combines the audit log and login-event streams into one feed,
        ordered by `occurred_at`.

        **Masking:** `actor_display_name` is replaced with a constant
        "Super Admin" label whenever the underlying actor is a Super Admin
        and the viewer isn't a Super Admin themself. For `LOGIN`/`LOGOUT`/
        `FAILED_LOGIN` events, `entity_display_name` (which in those rows
        also identifies the actor's own account) is masked the same way;
        for every other action type, `entity_display_name` describes a
        different target and is left untouched.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 25 }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
        - name: action
          in: query
          schema: { type: string }
          description: Filter by action, e.g. `CREATE_PERSON`, `LOGIN`
        - name: entity_type
          in: query
          schema: { type: string }
          description: Filter by entity type, e.g. `PERSON`, `TREE`, `LOGIN`
        - name: namespace_id
          in: query
          schema: { type: string, format: uuid }
          description: Super Admin/Auditor only — filter to one namespace.
        - name: sort
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        "200":
          description: Paginated activity feed
          content:
            application/json:
              schema:
                type: object
                required: [total, items, page, page_size, total_pages]
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityItem"
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: Activity log is restricted to Admin and Auditor roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /activity/export:
    get:
      tags: [Activity]
      operationId: exportActivity
      summary: Export activity feed as CSV (admin/auditor only)
      description: |
        Requires `ADMIN`, `AUDITOR`, or `SUPER_ADMIN` app role → `403`
        otherwise. Same scoping, filtering, and actor/entity masking rules
        as `GET /activity`, but returns up to 10,000 rows as a CSV file
        instead of a paginated JSON list.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
        - name: action
          in: query
          schema: { type: string }
        - name: entity_type
          in: query
          schema: { type: string }
        - name: namespace_id
          in: query
          schema: { type: string, format: uuid }
          description: Super Admin/Auditor only — filter to one namespace.
        - name: sort
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        "200":
          description: CSV export of the activity feed
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: Activity log is restricted to Admin and Auditor roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# ============================================================
# TREE SHARING — TENANT USERS (extends Trees)
# ============================================================

  /trees/{treeId}/tenant-users:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Trees]
      operationId: listTenantUsersForShare
      summary: List tenant users not already in this tree, paginated and searchable (for share modal, OWNER/ADMIN only)
      description: |
        Requires a non-`AUDITOR` verified user who holds `OWNER` or `ADMIN`
        role on the tree → `403` otherwise. Excludes inactive users and
        `SUPER_ADMIN` accounts, and excludes anyone already a member of the
        tree.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
      responses:
        "200":
          description: Paginated tenant users eligible to be added to this tree
          content:
            application/json:
              schema:
                type: object
                required: [total, items, page, page_size, total_pages]
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TenantUserForShare"
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

