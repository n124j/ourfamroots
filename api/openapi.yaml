openapi: "3.1.0"

info:
  title: OurFamRoots API
  version: "1.0.0"
  description: |
    ## OurFamRoots REST API — v1

    A multi-tenant genealogy platform API following REST conventions.

    ### Versioning
    URL-path versioning: all v1 endpoints are prefixed `/api/v1`.
    Breaking changes increment the major version (`/api/v2`).
    Minor/patch changes are backward-compatible and do not change the URL.

    ### Authentication
    Two tokens are issued on login:
    - **Access token** — short-lived JWT (15 min), passed as `Authorization: Bearer <token>`
    - **Refresh token** — long-lived (30 days), stored as an `HttpOnly SameSite=Strict` cookie

    ### Multi-tenancy
    Every request is scoped to a tenant derived from the JWT `tenant_id` claim.
    Tenant is never supplied by the caller — it is always resolved server-side from the token.

    ### Rate limiting
    All endpoints return rate-limit headers:
    - `X-RateLimit-Limit` — requests allowed in the current window
    - `X-RateLimit-Remaining` — requests remaining in the current window
    - `X-RateLimit-Reset` — Unix timestamp when the window resets
    - `Retry-After` — seconds to wait (only present on 429 responses)

    Default limits by plan:
    | Plan        | Requests/min | Burst |
    |-------------|-------------|-------|
    | FREE        | 60          | 10    |
    | BASIC       | 300         | 30    |
    | PREMIUM     | 1000        | 100   |
    | PROFESSIONAL| 5000        | 500   |

    ### Pagination
    List endpoints use **cursor-based pagination**:
    ```
    GET /api/v1/trees/{treeId}/persons?limit=50&cursor=<opaque_cursor>
    ```
    Response envelope:
    ```json
    {
      "data": [...],
      "pagination": {
        "cursor": "next_page_cursor",
        "hasMore": true,
        "totalCount": 1234
      }
    }
    ```

    ### Error format
    All errors follow [RFC 7807](https://datatracker.ietf.org/doc/html/rfc7807):
    ```json
    {
      "type": "https://ourfamroots.com/errors/validation-error",
      "title": "Validation Error",
      "status": 422,
      "detail": "The request body contains invalid fields.",
      "instance": "/api/v1/trees/abc/persons",
      "errors": [
        { "field": "sex", "code": "INVALID_ENUM", "message": "Must be one of: MALE, FEMALE, OTHER, UNKNOWN" }
      ],
      "requestId": "req_01hzab..."
    }
    ```

  contact:
    name: OurFamRoots Engineering
    email: api@ourfamroots.com
  license:
    name: Proprietary

servers:
  - url: https://api.ourfamroots.com/api/v1
    description: Production
  - url: https://api.staging.ourfamroots.com/api/v1
    description: Staging
  - url: http://localhost:7004/api/v1
    description: Local development

# ──────────────────────────────────────────────────────────────
# SECURITY SCHEMES
# ──────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT access token issued on login. Expires in 15 minutes.
        Payload includes: sub (user_id), tenant_id, email, roles, plan.

    CookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: >
        HttpOnly SameSite=Strict cookie holding the refresh token.
        Used only on POST /auth/refresh and POST /auth/logout.

  # ──────────────────────────────────────────────────────────
  # COMMON PARAMETERS
  # ──────────────────────────────────────────────────────────
  parameters:
    treeId:
      name: treeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Family tree identifier

    personId:
      name: personId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Person identifier

    familyGroupId:
      name: familyGroupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Family group identifier

    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Event identifier

    mediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Media item identifier

    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User identifier

    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: Maximum number of items to return

    cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor from a previous response

  # ──────────────────────────────────────────────────────────
  # COMMON HEADERS
  # ──────────────────────────────────────────────────────────
  headers:
    X-RateLimit-Limit:
      schema:
        type: integer
      description: Request limit for the current window
    X-RateLimit-Remaining:
      schema:
        type: integer
      description: Requests remaining in the current window
    X-RateLimit-Reset:
      schema:
        type: integer
      description: Unix timestamp when the rate limit window resets
    X-Request-ID:
      schema:
        type: string
      description: Unique request identifier for tracing

  # ──────────────────────────────────────────────────────────
  # SCHEMAS
  # ──────────────────────────────────────────────────────────
  schemas:

    # ── Enums ───────────────────────────────────────────────
    PersonSex:
      type: string
      enum: [MALE, FEMALE, OTHER, UNKNOWN]

    PrivacyLevel:
      type: string
      enum: [PUBLIC, FAMILY, PRIVATE]

    NameType:
      type: string
      enum: [BIRTH, MARRIED, ALSO_KNOWN_AS, NICKNAME, RELIGIOUS, ADOPTED, OTHER]

    UnionType:
      type: string
      enum: [MARRIAGE, CIVIL_UNION, DOMESTIC_PARTNERSHIP, COHABITATION, UNKNOWN]

    ParentageType:
      type: string
      enum: [BIOLOGICAL, ADOPTIVE, STEP, FOSTER, UNKNOWN]

    RelationshipType:
      type: string
      enum: [SPOUSE, PARTNER, GODPARENT, GUARDIAN, MENTOR, CUSTOM]

    EventType:
      type: string
      enum:
        - BIRTH
        - DEATH
        - BAPTISM
        - BURIAL
        - CREMATION
        - MARRIAGE
        - DIVORCE
        - ENGAGEMENT
        - ANNULMENT
        - IMMIGRATION
        - EMIGRATION
        - NATURALIZATION
        - OCCUPATION
        - RETIREMENT
        - GRADUATION
        - MILITARY_SERVICE
        - MILITARY_DISCHARGE
        - RESIDENCE
        - CENSUS
        - MEDICAL
        - RELIGIOUS
        - CUSTOM

    EventDateQualifier:
      type: string
      enum: [EXACT, ABOUT, BEFORE, AFTER, BETWEEN, CALCULATED, ESTIMATED]

    ConfidenceLevel:
      type: string
      enum: [PROVEN, PROBABLE, POSSIBLE, UNVERIFIED]

    MediaType:
      type: string
      enum: [PHOTO, DOCUMENT, AUDIO, VIDEO, OTHER]

    CollaboratorRole:
      type: string
      enum: [VIEWER, CONTRIBUTOR, EDITOR, ADMIN]

    # ── Error ───────────────────────────────────────────────
    Error:
      type: object
      required: [type, title, status, requestId]
      properties:
        type:
          type: string
          format: uri
          example: "https://ourfamroots.com/errors/validation-error"
        title:
          type: string
          example: "Validation Error"
        status:
          type: integer
          example: 422
        detail:
          type: string
          example: "The request body contains invalid fields."
        instance:
          type: string
          example: "/api/v1/trees/abc/persons"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
        requestId:
          type: string
          example: "req_01hzab3k7x"

    FieldError:
      type: object
      required: [field, code, message]
      properties:
        field:
          type: string
          example: "sex"
        code:
          type: string
          example: "INVALID_ENUM"
        message:
          type: string
          example: "Must be one of: MALE, FEMALE, OTHER, UNKNOWN"

    # ── Pagination ──────────────────────────────────────────
    Pagination:
      type: object
      required: [hasMore]
      properties:
        cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page (null if no more pages)
        hasMore:
          type: boolean
        totalCount:
          type: integer
          description: Total matching records (expensive; only returned when requested)

    # ── Auth / Tokens ───────────────────────────────────────
    TokenPair:
      type: object
      required: [accessToken, tokenType, expiresIn, user]
      properties:
        accessToken:
          type: string
          description: Short-lived JWT (15 min)
        tokenType:
          type: string
          enum: [Bearer]
        expiresIn:
          type: integer
          example: 900
          description: Access token TTL in seconds
        user:
          $ref: "#/components/schemas/UserProfile"

    # ── User ────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, email, displayName, isVerified, plan, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
          maxLength: 100
        avatarUrl:
          type: string
          format: uri
          nullable: true
        locale:
          type: string
          example: "en"
        timezone:
          type: string
          example: "America/New_York"
        isVerified:
          type: boolean
        plan:
          type: string
          enum: [FREE, BASIC, PREMIUM, FAMILY, PROFESSIONAL]
        createdAt:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        avatarUrl:
          type: string
          format: uri
          nullable: true
        locale:
          type: string
          pattern: "^[a-z]{2}(-[A-Z]{2})?$"
        timezone:
          type: string

    # ── Tree ────────────────────────────────────────────────
    Tree:
      type: object
      required: [id, name, ownerId, isPublic, privacyLevel, personCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
          format: uuid
        isPublic:
          type: boolean
        privacyLevel:
          $ref: "#/components/schemas/PrivacyLevel"
        personCount:
          type: integer
        myRole:
          $ref: "#/components/schemas/CollaboratorRole"
          description: The calling user's role in this tree
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTreeRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
          nullable: true
        isPublic:
          type: boolean
          default: false
        privacyLevel:
          $ref: "#/components/schemas/PrivacyLevel"
          default: FAMILY

    UpdateTreeRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
          nullable: true
        isPublic:
          type: boolean
        privacyLevel:
          $ref: "#/components/schemas/PrivacyLevel"

    Collaborator:
      type: object
      required: [userId, role, grantedAt]
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        role:
          $ref: "#/components/schemas/CollaboratorRole"
        grantedAt:
          type: string
          format: date-time

    Invitation:
      type: object
      required: [id, email, role, status, expiresAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/CollaboratorRole"
        status:
          type: string
          enum: [PENDING, ACCEPTED, DECLINED, EXPIRED, REVOKED]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    # ── Person ──────────────────────────────────────────────
    PersonName:
      type: object
      required: [id, nameType, isPrimary]
      properties:
        id:
          type: string
          format: uuid
        nameType:
          $ref: "#/components/schemas/NameType"
        givenName:
          type: string
          nullable: true
        surname:
          type: string
          nullable: true
        prefix:
          type: string
          nullable: true
        suffix:
          type: string
          nullable: true
        nickname:
          type: string
          nullable: true
        fullNameText:
          type: string
          nullable: true
          description: Free-form override for non-Western names
        isPrimary:
          type: boolean
        validFrom:
          type: string
          format: date
          nullable: true
        validTo:
          type: string
          format: date
          nullable: true

    Person:
      type: object
      required: [id, treeId, sex, privacyLevel, isLiving, isDeceased, names, version, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        treeId:
          type: string
          format: uuid
        sex:
          $ref: "#/components/schemas/PersonSex"
        privacyLevel:
          $ref: "#/components/schemas/PrivacyLevel"
        isLiving:
          type: boolean
        isDeceased:
          type: boolean
        displayGivenName:
          type: string
          nullable: true
        displaySurname:
          type: string
          nullable: true
        names:
          type: array
          items:
            $ref: "#/components/schemas/PersonName"
        customFields:
          type: object
          additionalProperties: true
        gedcomXref:
          type: string
          nullable: true
        version:
          type: integer
          description: Optimistic lock version — must be echoed on PATCH requests
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PersonSummary:
      type: object
      description: Lightweight representation used in list responses and tree views
      required: [id, sex, isLiving, isDeceased]
      properties:
        id:
          type: string
          format: uuid
        sex:
          $ref: "#/components/schemas/PersonSex"
        isLiving:
          type: boolean
        isDeceased:
          type: boolean
        displayGivenName:
          type: string
          nullable: true
        displaySurname:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
          description: Presigned URL for the person's profile photo
        privacyLevel:
          $ref: "#/components/schemas/PrivacyLevel"
        birthDate:
          type: string
          format: date
          nullable: true
          description: Full birth date (ISO 8601 YYYY-MM-DD)
        deathDate:
          type: string
          format: date
          nullable: true
          description: Full death date (ISO 8601 YYYY-MM-DD)
        birthYear:
          type: integer
          nullable: true
          description: Year-only fallback when full birth date is unknown
        deathYear:
          type: integer
          nullable: true
          description: Year-only fallback when full death date is unknown
        facebookHandle:
          type: string
          nullable: true
          description: Facebook username (without @ or URL prefix)
        xHandle:
          type: string
          nullable: true
          description: X / Twitter handle (without @ or URL prefix)
        linkedinHandle:
          type: string
          nullable: true
          description: LinkedIn username (without URL prefix)

    CreatePersonNameInput:
      type: object
      required: [nameType, isPrimary]
      properties:
        nameType:
          $ref: "#/components/schemas/NameType"
        givenName:
          type: string
          maxLength: 200
          nullable: true
        surname:
          type: string
          maxLength: 200
          nullable: true
        prefix:
          type: string
          maxLength: 50
          nullable: true
        suffix:
          type: string
          maxLength: 50
          nullable: true
        nickname:
          type: string
          maxLength: 200
          nullable: true
        fullNameText:
          type: string
          maxLength: 500
          nullable: true
        isPrimary:
          type: boolean
          default: false
        validFrom:
          type: string
          format: date
          nullable: true
        validTo:
          type: string
          format: date
          nullable: true

    CreatePersonRequest:
      type: object
      required: [names]
      properties:
        sex:
          $ref: "#/components/schemas/PersonSex"
          default: UNKNOWN
        privacyLevel:
          $ref: "#/components/schemas/PrivacyLevel"
          default: FAMILY
        isLiving:
          type: boolean
          default: true
        isDeceased:
          type: boolean
          default: false
        names:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreatePersonNameInput"
          description: At least one name required; exactly one must have isPrimary=true
        customFields:
          type: object
          additionalProperties: true

    UpdatePersonRequest:
      type: object
      required: [version]
      minProperties: 2
      properties:
        version:
          type: integer
          description: Must match current server version (optimistic locking)
        sex:
          $ref: "#/components/schemas/PersonSex"
        privacyLevel:
          $ref: "#/components/schemas/PrivacyLevel"
        isLiving:
          type: boolean
        isDeceased:
          type: boolean
        customFields:
          type: object
          additionalProperties: true

    AncestorNode:
      type: object
      required: [person, depth, familyGroupId]
      properties:
        person:
          $ref: "#/components/schemas/PersonSummary"
        depth:
          type: integer
          description: "1 = parent, 2 = grandparent, etc."
        familyGroupId:
          type: string
          format: uuid
        parentageType:
          $ref: "#/components/schemas/ParentageType"

    # ── Family Group ─────────────────────────────────────────
    FamilyGroup:
      type: object
      required: [id, treeId, unionType, isDivorced, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        treeId:
          type: string
          format: uuid
        parent1:
          $ref: "#/components/schemas/PersonSummary"
          nullable: true
        parent2:
          $ref: "#/components/schemas/PersonSummary"
          nullable: true
        children:
          type: array
          items:
            $ref: "#/components/schemas/FamilyGroupChild"
        unionType:
          $ref: "#/components/schemas/UnionType"
        isDivorced:
          type: boolean
        gedcomXref:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FamilyGroupChild:
      type: object
      required: [person, parentageType]
      properties:
        person:
          $ref: "#/components/schemas/PersonSummary"
        parentageType:
          $ref: "#/components/schemas/ParentageType"
        birthOrder:
          type: integer
          nullable: true

    CreateFamilyGroupRequest:
      type: object
      properties:
        parent1Id:
          type: string
          format: uuid
          nullable: true
        parent2Id:
          type: string
          format: uuid
          nullable: true
        unionType:
          $ref: "#/components/schemas/UnionType"
          default: MARRIAGE
        isDivorced:
          type: boolean
          default: false
      description: At least one parentId should be provided

    AddFamilyMemberRequest:
      type: object
      required: [personId, memberRole]
      properties:
        personId:
          type: string
          format: uuid
        memberRole:
          type: string
          enum: [PARENT, CHILD]
        parentageType:
          $ref: "#/components/schemas/ParentageType"
          description: Required when memberRole = CHILD
        birthOrder:
          type: integer
          minimum: 1
          nullable: true

    Relationship:
      type: object
      required: [id, person1Id, person2Id, relationshipType, confidenceLevel, createdAt]
      properties:
        id:
          type: string
          format: uuid
        person1Id:
          type: string
          format: uuid
        person2Id:
          type: string
          format: uuid
        relationshipType:
          $ref: "#/components/schemas/RelationshipType"
        notes:
          type: string
          nullable: true
        confidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
        createdAt:
          type: string
          format: date-time

    CreateRelationshipRequest:
      type: object
      required: [person1Id, person2Id, relationshipType]
      properties:
        person1Id:
          type: string
          format: uuid
        person2Id:
          type: string
          format: uuid
        relationshipType:
          $ref: "#/components/schemas/RelationshipType"
        notes:
          type: string
          maxLength: 2000
          nullable: true
        confidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
          default: UNVERIFIED

    # ── Place ────────────────────────────────────────────────
    Place:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        city:
          type: string
          nullable: true
        county:
          type: string
          nullable: true
        stateProvince:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        countryCode:
          type: string
          pattern: "^[A-Z]{2}$"
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true

    # ── Event ────────────────────────────────────────────────
    Event:
      type: object
      required: [id, eventType, eventDateQualifier, confidenceLevel, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        personId:
          type: string
          format: uuid
          nullable: true
        familyGroupId:
          type: string
          format: uuid
          nullable: true
        eventType:
          $ref: "#/components/schemas/EventType"
        eventDate:
          type: string
          format: date
          nullable: true
        eventDateQualifier:
          $ref: "#/components/schemas/EventDateQualifier"
        eventDateRangeEnd:
          type: string
          format: date
          nullable: true
        eventDateOriginal:
          type: string
          nullable: true
          description: Raw GEDCOM date string
        place:
          $ref: "#/components/schemas/Place"
          nullable: true
        description:
          type: string
          nullable: true
        confidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEventRequest:
      type: object
      required: [eventType]
      properties:
        personId:
          type: string
          format: uuid
          nullable: true
        familyGroupId:
          type: string
          format: uuid
          nullable: true
        eventType:
          $ref: "#/components/schemas/EventType"
        eventDate:
          type: string
          format: date
          nullable: true
        eventDateQualifier:
          $ref: "#/components/schemas/EventDateQualifier"
          default: EXACT
        eventDateRangeEnd:
          type: string
          format: date
          nullable: true
        eventDateOriginal:
          type: string
          nullable: true
        placeId:
          type: string
          format: uuid
          nullable: true
        newPlace:
          $ref: "#/components/schemas/CreatePlaceRequest"
          nullable: true
          description: Create a new place inline; mutually exclusive with placeId
        description:
          type: string
          maxLength: 5000
          nullable: true
        confidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
          default: UNVERIFIED
      description: Exactly one of personId or familyGroupId must be provided

    CreatePlaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 500
        city:
          type: string
          nullable: true
        county:
          type: string
          nullable: true
        stateProvince:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        countryCode:
          type: string
          pattern: "^[A-Z]{2}$"
          nullable: true
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          nullable: true
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          nullable: true

    # ── Media ────────────────────────────────────────────────
    MediaUploadRequest:
      type: object
      required: [filename, mimeType, fileSizeBytes]
      properties:
        filename:
          type: string
          maxLength: 255
        mimeType:
          type: string
          enum:
            - image/jpeg
            - image/png
            - image/gif
            - image/webp
            - image/heic
            - application/pdf
            - audio/mpeg
            - audio/wav
            - video/mp4
            - video/quicktime
        fileSizeBytes:
          type: integer
          minimum: 1
          maximum: 524288000
          description: Maximum 500 MB
      description: Request a pre-signed upload URL. Upload the file directly to S3 using the returned URL.

    MediaUploadResponse:
      type: object
      required: [mediaId, uploadUrl, expiresAt]
      properties:
        mediaId:
          type: string
          format: uuid
          description: Media record created in PENDING status
        uploadUrl:
          type: string
          format: uri
          description: Pre-signed S3 PUT URL — valid for 15 minutes
        expiresAt:
          type: string
          format: date-time

    Media:
      type: object
      required: [id, mediaType, originalFilename, status, fileSizeBytes, mimeType, createdAt]
      properties:
        id:
          type: string
          format: uuid
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFilename:
          type: string
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        variants:
          type: array
          items:
            $ref: "#/components/schemas/MediaVariant"
        fileSizeBytes:
          type: integer
        mimeType:
          type: string
        widthPx:
          type: integer
          nullable: true
        heightPx:
          type: integer
          nullable: true
        status:
          type: string
          enum: [PENDING, PROCESSING, READY, FAILED, DELETED]
        uploadedBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MediaVariant:
      type: object
      required: [size, url, width, height]
      properties:
        size:
          type: string
          example: "800w"
        url:
          type: string
          format: uri
        width:
          type: integer
        height:
          type: integer

    MediaAttachment:
      type: object
      required: [id, mediaId, entityType, entityId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        mediaId:
          type: string
          format: uuid
        entityType:
          type: string
          enum: [person, family_group, event, tree]
        entityId:
          type: string
          format: uuid
        caption:
          type: string
          nullable: true
        faceRegion:
          type: object
          nullable: true
          description: Normalised bounding box {x, y, width, height} for face tags
          properties:
            x:
              type: number
              format: float
              minimum: 0
              maximum: 1
            y:
              type: number
              format: float
              minimum: 0
              maximum: 1
            width:
              type: number
              format: float
              minimum: 0
              maximum: 1
            height:
              type: number
              format: float
              minimum: 0
              maximum: 1
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateAttachmentRequest:
      type: object
      required: [entityType, entityId]
      properties:
        entityType:
          type: string
          enum: [person, family_group, event, tree]
        entityId:
          type: string
          format: uuid
        caption:
          type: string
          maxLength: 1000
          nullable: true
        faceRegion:
          type: object
          nullable: true
          properties:
            x:
              type: number
              format: float
              minimum: 0
              maximum: 1
            y:
              type: number
              format: float
              minimum: 0
              maximum: 1
            width:
              type: number
              format: float
              minimum: 0
              maximum: 1
            height:
              type: number
              format: float
              minimum: 0
              maximum: 1

    # ── Search ───────────────────────────────────────────────
    PersonSearchResult:
      type: object
      required: [person, score]
      properties:
        person:
          $ref: "#/components/schemas/PersonSummary"
        score:
          type: number
          format: float
          description: Relevance score (0–1)
        matchedFields:
          type: array
          items:
            type: string
          example: ["displaySurname", "displayGivenName"]

    # ── Export / Import ──────────────────────────────────────
    ExportJob:
      type: object
      required: [id, format, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        format:
          type: string
          enum: [GEDCOM_551, GEDCOM_70, PDF_PEDIGREE, PDF_FAMILY_BOOK, CSV, JSON]
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED, CANCELLED]
        downloadUrl:
          type: string
          format: uri
          nullable: true
        urlExpiresAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    ImportJob:
      type: object
      required: [id, format, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        format:
          type: string
          enum: [GEDCOM_551, GEDCOM_70, CSV, JSON]
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED, CANCELLED]
        totalRecords:
          type: integer
        processedRecords:
          type: integer
        errorCount:
          type: integer
        errorDetails:
          type: array
          items:
            type: object
            properties:
              line:
                type: integer
              code:
                type: string
              message:
                type: string
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── .frt native backup format ─────────────────────────────
    FrtPerson:
      type: object
      description: Person record within a .frt backup file
      required: [id, display_given_name, display_surname, sex, is_living, is_deceased]
      properties:
        id:
          type: string
        display_given_name:
          type: string
        display_surname:
          type: string
        sex:
          type: string
          enum: [MALE, FEMALE, OTHER, UNKNOWN]
        is_living:
          type: boolean
        is_deceased:
          type: boolean
        photo_url:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
          description: Full birth date (ISO 8601 YYYY-MM-DD)
        death_date:
          type: string
          format: date
          nullable: true
          description: Full death date (ISO 8601 YYYY-MM-DD)
        birth_year:
          type: integer
          nullable: true
          description: Year-only fallback when full birth date is unknown
        death_year:
          type: integer
          nullable: true
          description: Year-only fallback when full death date is unknown
        facebook_handle:
          type: string
          nullable: true
        x_handle:
          type: string
          nullable: true
        linkedin_handle:
          type: string
          nullable: true

    FrtFamilyGroup:
      type: object
      description: Family group record within a .frt backup file
      required: [id, union_type, parent_ids, children]
      properties:
        id:
          type: string
        union_type:
          type: string
          enum: [MARRIAGE, PARTNERSHIP, COHABITATION, UNKNOWN]
        custom_label:
          type: string
          nullable: true
          description: User-defined label overriding the auto-generated ordinal
        parent_ids:
          type: array
          items:
            type: string
        children:
          type: object
          additionalProperties:
            type: string
            enum: [BIOLOGICAL, ADOPTIVE, STEP, FOSTER, UNKNOWN]

    FrtBackup:
      type: object
      description: Complete .frt backup file structure for export and import
      required: [frt_version, tree_name, persons, family_groups]
      properties:
        frt_version:
          type: string
          example: "1.0"
        exported_at:
          type: string
          format: date-time
        tree_name:
          type: string
        tree_description:
          type: string
          nullable: true
        persons:
          type: array
          items:
            $ref: "#/components/schemas/FrtPerson"
        family_groups:
          type: array
          items:
            $ref: "#/components/schemas/FrtFamilyGroup"

  # ──────────────────────────────────────────────────────────
  # COMMON RESPONSES
  # ──────────────────────────────────────────────────────────
  responses:
    400BadRequest:
      description: Bad Request — malformed JSON or missing required fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    401Unauthorized:
      description: Unauthorized — missing or invalid access token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    403Forbidden:
      description: Forbidden — valid token but insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    404NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    409Conflict:
      description: Conflict — optimistic lock version mismatch or duplicate resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    422UnprocessableEntity:
      description: Unprocessable Entity — validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    429TooManyRequests:
      description: Too Many Requests — rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

# ──────────────────────────────────────────────────────────────
# GLOBAL SECURITY (override per-operation where needed)
# ──────────────────────────────────────────────────────────────
security:
  - BearerAuth: []

# ──────────────────────────────────────────────────────────────
# TAGS
# ──────────────────────────────────────────────────────────────
tags:
  - name: Authentication
    description: Register, login, logout, token refresh, OAuth, password reset
  - name: Users
    description: Current user profile and preferences
  - name: Trees
    description: Family tree CRUD, collaborators, invitations, import/export
  - name: Persons
    description: Person CRUD, names, ancestor/descendant traversal
  - name: Relationships
    description: Family groups, family members, non-family relationships
  - name: Events
    description: Life events for persons and family groups
  - name: Media
    description: Photo and document upload, management, and attachment
  - name: Search
    description: Full-text, fuzzy, and structured person and place search
  - name: Places
    description: Normalised place registry

# ──────────────────────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────────────────────
paths:

  # ============================================================
  # AUTHENTICATION
  # ============================================================

  /auth/register:
    post:
      tags: [Authentication]
      operationId: register
      summary: Register a new user account
      description: |
        Creates a new user in the shared `ourfamroots-system` tenant (configured by
        `DEFAULT_TENANT_SLUG`). No JWT is issued — the account cannot log in until
        the verification email link is clicked.

        **No `tenant_slug` field** — all users join the single shared workspace.
        The first user ever to register becomes `ADMIN`; all subsequent users
        receive the `STANDARD` role.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, given_name, family_name]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 254
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: >
                    Must contain at least one uppercase letter and one digit.
                given_name:
                  type: string
                  minLength: 1
                  maxLength: 100
                family_name:
                  type: string
                  minLength: 1
                  maxLength: 100
      responses:
        "204":
          description: Account created — verification email sent. No body, no session cookie.
        "409":
          description: Email already registered in this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /auth/login:
    post:
      tags: [Authentication]
      operationId: login
      summary: Authenticate with email and password
      description: |
        Returns an access token (JSON body) and sets an `HttpOnly` refresh token
        cookie. Login is blocked with `403 account-not-verified` until the
        user's email has been verified (either via the link in the registration
        email or manually by an Admin).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                rememberMe:
                  type: boolean
                  default: false
                  description: Extends refresh token TTL from 30 days to 90 days
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "HttpOnly SameSite=Lax refresh_token cookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Email not verified (`type` = `account-not-verified`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "423":
          description: Account locked after too many failed attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /auth/logout:
    post:
      tags: [Authentication]
      operationId: logout
      summary: Invalidate the current session
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "204":
          description: Logged out — refresh token revoked and cookie cleared
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /auth/refresh:
    post:
      tags: [Authentication]
      operationId: refreshToken
      summary: Issue a new access token using the refresh cookie
      security:
        - CookieAuth: []
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                required: [accessToken, expiresIn]
                properties:
                  accessToken:
                    type: string
                  expiresIn:
                    type: integer
                    example: 900
        "401":
          description: Refresh token missing, expired, or revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /auth/verify-email:
    post:
      tags: [Authentication]
      operationId: verifyEmail
      summary: Verify email address with token from verification email
      description: |
        Marks the user's email as verified. The token is a 64-character hex
        string embedded in the verification link emailed at registration time.
        After verification the user can log in normally.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: 64-character hex token from the verification email
      responses:
        "204":
          description: Email verified — no body
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/resend-verification:
    post:
      tags: [Authentication]
      operationId: resendVerification
      summary: Resend the email verification link
      description: |
        Generates a new verification token and sends a fresh verification email.
        Always returns `204` regardless of whether the email exists or is already
        verified, to prevent account enumeration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "204":
          description: Verification email sent (or silently ignored if not applicable)
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /auth/forgot-password:
    post:
      tags: [Authentication]
      operationId: forgotPassword
      summary: Request a password reset email
      description: |
        Sends a password reset link to the given email address.

        - If the email is **unknown** — returns `204` silently (prevents enumeration).
        - If the account **email is not verified** — returns `403 account-not-verified`.
          The user must verify their email before they can reset their password.
          Use `POST /auth/resend-verification` to get a new verification link.
        - If the account is **verified** — sends a reset email and returns `204`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "204":
          description: Reset email sent (or silently ignored for unknown address)
        "403":
          description: |
            Account email not verified (`type` = `account-not-verified`).
            Verify the email first before requesting a password reset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /auth/reset-password:
    post:
      tags: [Authentication]
      operationId: resetPassword
      summary: Reset password using token from reset email
      description: |
        Sets a new password for the account identified by the reset token.
        On success the token is invalidated and all existing refresh tokens
        for the account are revoked (forcing re-login on all devices).

        Also used as the **account activation** flow for admin-created users:
        the activation email contains a link to this endpoint so the user can
        set their own password on first access.

        If the account email was not previously verified, successfully using
        a reset token automatically marks it as verified.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                  description: Token from the password reset or activation email
                new_password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: >
                    Must contain at least one uppercase letter and one digit.
      responses:
        "204":
          description: Password updated — all sessions revoked
        "401":
          description: Token invalid or expired (`type` = `token-invalid` or `token-expired`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: New password does not meet strength requirements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/oauth/{provider}:
    get:
      tags: [Authentication]
      operationId: oauthRedirect
      summary: Redirect to OAuth provider authorisation page
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, facebook, apple]
        - name: redirectUri
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to provider
        "400":
          $ref: "#/components/responses/400BadRequest"

  /auth/oauth/{provider}/callback:
    get:
      tags: [Authentication]
      operationId: oauthCallback
      summary: Handle OAuth provider callback
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, facebook, apple]
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OAuth login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "409":
          description: Email already registered with a different provider

  # ============================================================
  # USERS
  # ============================================================

  /users/me:
    get:
      tags: [Users]
      operationId: getMe
      summary: Get the current user's profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/401Unauthorized"

    patch:
      tags: [Users]
      operationId: updateMe
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

    delete:
      tags: [Users]
      operationId: deleteMe
      summary: Delete the current user's account (scheduled deletion — 30-day grace period)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmPassword]
              properties:
                confirmPassword:
                  type: string
      responses:
        "202":
          description: Deletion scheduled — 30-day grace period before permanent removal
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /users/me/change-password:
    post:
      tags: [Users]
      operationId: changePassword
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 10
                  maxLength: 128
      responses:
        "200":
          description: Password changed — all existing sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /users/me/sessions:
    get:
      tags: [Users]
      operationId: listSessions
      summary: List active sessions for the current user
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        sessionId:
                          type: string
                        deviceInfo:
                          type: string
                          nullable: true
                        ipAddress:
                          type: string
                        lastUsedAt:
                          type: string
                          format: date-time
                        isCurrent:
                          type: boolean
        "401":
          $ref: "#/components/responses/401Unauthorized"

    delete:
      tags: [Users]
      operationId: revokeAllSessions
      summary: Revoke all sessions except the current one
      responses:
        "204":
          description: All other sessions revoked
        "401":
          $ref: "#/components/responses/401Unauthorized"

  # ============================================================
  # TREES
  # ============================================================

  /trees:
    get:
      tags: [Trees]
      operationId: listTrees
      summary: List trees the current user owns or collaborates on
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/CollaboratorRole"
          description: Filter by user's role in the tree
      responses:
        "200":
          description: List of trees
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tree"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"

    post:
      tags: [Trees]
      operationId: createTree
      summary: Create a new family tree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTreeRequest"
      responses:
        "201":
          description: Tree created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tree"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /trees/{treeId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Trees]
      operationId: getTree
      summary: Get a family tree by ID
      responses:
        "200":
          description: Tree detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tree"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Trees]
      operationId: updateTree
      summary: Update a tree's metadata
      description: Requires ADMIN or EDITOR role, or tree ownership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTreeRequest"
      responses:
        "200":
          description: Updated tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tree"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Trees]
      operationId: deleteTree
      summary: Soft-delete a tree (owner only, or Super Admin for any tree)
      description: |
        Sets `is_deleted = true` on the tree immediately (synchronous, not a
        scheduled/background job) and writes a `DELETE_TREE` audit log entry.
        The tree's people, family groups, and history are not removed from
        the database, but every read endpoint filters on `is_deleted = false`,
        so the tree becomes permanently inaccessible through the API.

        **Authorization:**
        - The tree's `OWNER` collaborator can delete it.
        - A `SUPER_ADMIN` can delete **any** tree in the tenant, regardless of
          `tree_members` membership — this matches the "Owner" badge Super
          Admins are already shown on every tree in the dashboard's
          tenant-wide list view.
        - Any other role/non-member → `404` (membership check fails before an
          ownership check would even apply, to avoid revealing tree existence
          to non-members).
      responses:
        "204":
          description: Tree soft-deleted — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: Caller is a member of the tree but not its owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/collaborators:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Trees]
      operationId: listCollaborators
      summary: List collaborators on a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: List of collaborators
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Collaborator"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/collaborators/{userId}:
    parameters:
