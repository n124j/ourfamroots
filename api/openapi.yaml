  # ============================================================
  # TREES
  # ============================================================

  /trees:
    get:
      tags: [Trees]
      operationId: listTrees
      summary: List trees the current user owns or collaborates on
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/CollaboratorRole"
          description: Filter by user's role in the tree
      responses:
        "200":
          description: List of trees
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tree"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"

    post:
      tags: [Trees]
      operationId: createTree
      summary: Create a new family tree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTreeRequest"
      responses:
        "201":
          description: Tree created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tree"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /trees/{treeId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Trees]
      operationId: getTree
      summary: Get a family tree by ID
      responses:
        "200":
          description: Tree detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tree"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    patch:
      tags: [Trees]
      operationId: updateTree
      summary: Update a tree's metadata
      description: Requires ADMIN or EDITOR role, or tree ownership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTreeRequest"
      responses:
        "200":
          description: Updated tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tree"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Trees]
      operationId: deleteTree
      summary: Soft-delete a tree (owner only, or Super Admin for any tree)
      description: |
        Sets `is_deleted = true` on the tree immediately (synchronous, not a
        scheduled/background job) and writes a `DELETE_TREE` audit log entry.
        The tree's people, family groups, and history are not removed from
        the database, but every read endpoint filters on `is_deleted = false`,
        so the tree becomes permanently inaccessible through the API.

        **Authorization:**
        - The tree's `OWNER` collaborator can delete it.
        - A `SUPER_ADMIN` can delete **any** tree in the tenant, regardless of
          `tree_members` membership — this matches the "Owner" badge Super
          Admins are already shown on every tree in the dashboard's
          tenant-wide list view.
        - Any other role/non-member → `404` (membership check fails before an
          ownership check would even apply, to avoid revealing tree existence
          to non-members).
      responses:
        "204":
          description: Tree soft-deleted — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: Caller is a member of the tree but not its owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/collaborators:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Trees]
      operationId: listCollaborators
      summary: List collaborators on a tree
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: List of collaborators
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Collaborator"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/collaborators/{userId}:
    parameters:
      - $ref: "#/components/parameters/treeId"
      - $ref: "#/components/parameters/userId"
    patch:
      tags: [Trees]
      operationId: updateCollaboratorRole
      summary: Update a collaborator's role
      description: ADMIN or owner only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/CollaboratorRole"
      responses:
        "200":
          description: Updated collaborator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collaborator"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Trees]
      operationId: removeCollaborator
      summary: Remove a collaborator from a tree
      description: ADMIN or owner only (a user can also remove themselves)
      responses:
        "204":
          description: Collaborator removed
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/invitations:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Trees]
      operationId: listInvitations
      summary: List pending invitations for a tree
      responses:
        "200":
          description: Invitations list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invitation"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Trees]
      operationId: sendInvitation
      summary: Send an invitation to collaborate on a tree
      description: ADMIN or owner only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  $ref: "#/components/schemas/CollaboratorRole"
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "409":
          description: Invitation already pending for this email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invitations/{token}/accept:
    post:
      tags: [Trees]
      operationId: acceptInvitation
      summary: Accept a tree collaboration invitation
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation accepted — user is now a collaborator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tree"
        "400":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /trees/{treeId}/export:
    post:
      tags: [Trees]
      operationId: exportTree
      summary: Enqueue a tree export job
      parameters:
        - $ref: "#/components/parameters/treeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                format:
                  type: string
                  enum: [GEDCOM_551, GEDCOM_70, PDF_PEDIGREE, PDF_FAMILY_BOOK, CSV, JSON]
                options:
                  type: object
                  properties:
                    includeMedia:
                      type: boolean
                      default: false
                    privacyFilter:
                      $ref: "#/components/schemas/PrivacyLevel"
                      description: Exclude persons with stricter privacy level
      responses:
        "202":
          description: Export job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportJob"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

  /trees/{treeId}/export/{jobId}:
    get:
      tags: [Trees]
      operationId: getExportJob
      summary: Poll export job status and retrieve download URL when complete
      parameters:
        - $ref: "#/components/parameters/treeId"
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Export job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportJob"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/import:
    post:
      tags: [Trees]
      operationId: importTree
      summary: Upload a GEDCOM or other file and enqueue an import job
      parameters:
        - $ref: "#/components/parameters/treeId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, format]
              properties:
                file:
                  type: string
                  format: binary
                  description: Max 50 MB
                format:
                  type: string
                  enum: [GEDCOM_551, GEDCOM_70, CSV, JSON]
      responses:
        "202":
          description: Import job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJob"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "413":
          description: File too large (max 50 MB)

  /trees/{treeId}/import/{jobId}:
    get:
      tags: [Trees]
      operationId: getImportJob
      summary: Poll import job status
      parameters:
        - $ref: "#/components/parameters/treeId"
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Import job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJob"
        "404":
          $ref: "#/components/responses/404NotFound"


  # ── .ofr native backup import ─────────────────────────────────
  /trees/import:
    post:
      tags: [Trees]
      operationId: importOfrTree
      summary: Import a .ofr backup file as a new tree
      description: |
        Creates a new tree from a OurFamRoots .ofr backup file. All persons are
        re-created with new UUIDs. Imported fields include life dates (birth_date,
        death_date, birth_year, death_year), social handles (facebook_handle,
        x_handle, linkedin_handle), and family group custom labels.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfrBackup"
      responses:
        "201":
          description: Tree imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  tree_id:
                    type: string
                    format: uuid
                  tree_name:
                    type: string
                  person_count:
                    type: integer
                  family_group_count:
                    type: integer
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /trees/{treeId}/export-log:
    post:
      tags: [Trees]
      operationId: logTreeExport
      summary: Record a tree export event in the audit log
      parameters:
        - $ref: "#/components/parameters/treeId"
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Export event logged
        "401":
          $ref: "#/components/responses/401Unauthorized"

  # ============================================================
  # PERSONS
  # ============================================================

  /trees/{treeId}/persons:
    parameters:
      - $ref: "#/components/parameters/treeId"
    get:
      tags: [Persons]
      operationId: listPersons
      summary: List persons in a tree
      parameters:
        - $ref: "#/components/parameters/limit"
