                  type: string
                  format: email
                role:
                  $ref: "#/components/schemas/CollaboratorRole"
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "409":
          description: Invitation already pending for this email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invitations/{token}/accept:
    post:
      tags: [Trees]
      operationId: acceptInvitation
      summary: Accept a tree collaboration invitation
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation accepted — user is now a collaborator
          content:
