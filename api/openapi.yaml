# ============================================================
# Site Settings — Maintenance Mode
# ============================================================

  /site-settings/maintenance:
    get:
      tags: [Site Settings]
      operationId: getMaintenanceStatus
      summary: Get current maintenance mode status
      description: |
        Returns whether the site is in maintenance (Under Construction) mode
        and the customisable message shown to visitors. This endpoint is public
        and does not require authentication.
      security: []
      responses:
        "200":
          description: Current maintenance status
          content:
            application/json:
              schema:
                type: object
                properties:
                  maintenance_mode:    { type: boolean }
                  maintenance_message: { type: string }
    put:
      tags: [Site Settings]
      operationId: updateMaintenanceStatus
      summary: Update maintenance mode (Super Admin only)
      description: |
        Toggle maintenance mode on or off and optionally update the message
        shown to visitors. When enabled, all non-Super-Admin users see an
        "Under Construction" page. The Super Admin can continue to use the
        site normally.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maintenance_mode:    { type: boolean, nullable: true }
                maintenance_message: { type: string, nullable: true, maxLength: 2000 }
      responses:
        "200":
          description: Updated maintenance status
          content:
            application/json:
              schema:
                type: object
                properties:
                  maintenance_mode:    { type: boolean }
                  maintenance_message: { type: string }
        "403":
          $ref: "#/components/responses/403Forbidden"

# ============================================================
# Broadcast Email
# ============================================================

  /broadcast/recipients:
    get:
      tags: [Broadcast]
      operationId: listBroadcastRecipients
      summary: List eligible broadcast recipients
      description: |
        Returns all active, verified users eligible to receive broadcast emails.
        Users who have unsubscribed are included but flagged with
        `broadcast_unsubscribed: true`. Super Admin only.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Filter by name or email (ILIKE)
      responses:
        "200":
          description: Recipient list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:                      { type: string, format: uuid }
                        email:                   { type: string, format: email }
                        given_name:              { type: string, nullable: true }
                        family_name:             { type: string, nullable: true }
                        app_role:                { type: string }
                        broadcast_unsubscribed:  { type: boolean }
        "403":
          $ref: "#/components/responses/403Forbidden"

  /broadcast/send:
    post:
      tags: [Broadcast]
      operationId: sendBroadcast
      summary: Send a broadcast email
      description: |
        Compose and send an email to all active verified users or a selected
        subset. Users who have unsubscribed are automatically excluded.
        A log entry is saved to broadcast history and the action is recorded
        in the activity feed. Super Admin only.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, body]
              properties:
                subject:       { type: string, minLength: 1, maxLength: 200 }
                body:          { type: string, minLength: 1, maxLength: 10000 }
                category:      { type: string, enum: [notice, alert, event, update], default: notice }
                recipient_ids:
                  type: array
                  items: { type: string, format: uuid }
                  description: Specific user IDs. Empty array = send to all.
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent_count:   { type: integer }
                  failed_count: { type: integer }
        "400":
          description: No eligible recipients
        "403":
          $ref: "#/components/responses/403Forbidden"

  /broadcast/history:
    get:
      tags: [Broadcast]
      operationId: listBroadcastHistory
      summary: List broadcast email history
      description: |
        Returns a paginated list of past broadcast emails with subject, body,
        category, recipient list, and sent/failed counts. Super Admin only.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Broadcast history
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:                   { type: string, format: uuid }
                        sender_display_name:  { type: string }
                        subject:              { type: string }
                        body:                 { type: string }
                        category:             { type: string }
                        recipient_count:      { type: integer }
                        sent_count:           { type: integer }
                        failed_count:         { type: integer }
                        recipient_emails:     { type: array, items: { type: string } }
                        created_at:           { type: string, format: date-time }
        "403":
          $ref: "#/components/responses/403Forbidden"

  /broadcast/history/{logId}:
    parameters:
      - name: logId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Broadcast]
      operationId: deleteBroadcastLog
      summary: Delete a broadcast log entry
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Deleted
        "404":
          description: Log entry not found
        "403":
          $ref: "#/components/responses/403Forbidden"

# ============================================================
# User Broadcast Subscription
# ============================================================

  /users/me/broadcast-subscription:
    get:
      tags: [Users]
      operationId: getBroadcastSubscription
      summary: Get broadcast email subscription status
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                type: object
                properties:
                  broadcast_unsubscribed: { type: boolean }
    put:
      tags: [Users]
      operationId: updateBroadcastSubscription
      summary: Update broadcast email subscription preference
      description: |
        Allows users to opt out of (or back into) broadcast emails from the
        site administrator. Unsubscribed users are excluded from future
        broadcast sends.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                unsubscribed: { type: boolean }
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                type: object
                properties:
                  broadcast_unsubscribed: { type: boolean }

# ============================================================
# NAMESPACES (Super Admin) + NAMESPACE INVITATIONS
# ============================================================

  /admin/namespaces:
    get:
      tags: [Admin, Namespaces]
      operationId: listNamespaces
      summary: List namespaces, paginated and searchable (Super Admin only)
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
          description: Search by namespace name or slug (case-insensitive)
      responses:
        "200":
          description: Paginated namespace list
          content:
            application/json:
              schema:
                type: object
                required: [total, items, page, page_size, total_pages]
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Namespace"
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Admin, Namespaces]
      operationId: createNamespace
      summary: Create a new namespace (Super Admin only)
      description: |
        Requires `SUPER_ADMIN` app role. `slug` must be unique across all
        namespaces and match `^[a-z0-9]+(-[a-z0-9]+)*$`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string, minLength: 1, maxLength: 255 }
                slug:
                  type: string
                  minLength: 1
                  maxLength: 100
                  pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
      responses:
        "201":
          description: Namespace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
        "409":
          description: A namespace with this slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/namespaces/{namespaceId}:
    parameters:
      - name: namespaceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Admin, Namespaces]
      operationId: updateNamespace
      summary: Rename or activate/deactivate a namespace (Super Admin only)
      description: |
        Requires `SUPER_ADMIN` app role. All body fields are optional.

        **Restriction:** the Global namespace (the single namespace new users
        land in by default) cannot be deactivated → `400`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 255 }
                is_active: { type: boolean }
      responses:
        "200":
          description: Updated namespace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
        "400":
          description: The Global namespace cannot be deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/namespaces/{namespaceId}/users:
    parameters:
      - name: namespaceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Admin, Namespaces]
      operationId: listNamespaceUsers
      summary: List users in any namespace (Super Admin only)
      description: Requires `SUPER_ADMIN` app role.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 25 }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
          description: Search by name or email (case-insensitive)
      responses:
        "200":
          description: Paginated user list for this namespace
          content:
            application/json:
              schema:
                type: object
                required: [total, items, page, page_size, total_pages]
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/namespaces/{namespaceId}/invitations:
    parameters:
      - name: namespaceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Admin, Namespaces]
      operationId: createNamespaceInvitation
      summary: Invite a Global-namespace user into this namespace
      description: |
        Requires the `SUPER_ADMIN`, or an `ADMIN` of the target namespace.

        The invitee must already be an existing user of the Global namespace
        (found by email) — namespace invitations only ever move an existing
        account, they never create a new one. Cannot target the Global
        namespace itself.

        **Side effects:**
        - Invitation record created with a 168-hour (7-day) expiry.
        - Invitation email sent to the invitee (best-effort — failure does
          not roll back the invitation).
        - In-app notification + Web Push sent to the invitee (best-effort).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invitee_email, role]
              properties:
                invitee_email: { type: string, format: email }
                role:
                  type: string
                  enum: [ADMIN, STANDARD, AUDITOR]
                message: { type: string, maxLength: 500, nullable: true }
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceInvitation"
        "400":
          description: No Global namespace is configured, or the target namespace is the Global namespace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          description: Namespace not found, or no Global-namespace user found with that email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/namespaces/{namespaceId}/invitations/{invitationId}:
    parameters:
      - name: namespaceId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: invitationId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Admin, Namespaces]
      operationId: revokeNamespaceInvitation
      summary: Revoke a pending namespace invitation
      description: |
        Requires the `SUPER_ADMIN`, or an `ADMIN` of the target namespace.
        Only a `PENDING` invitation can be revoked.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Invitation revoked — no body
        "400":
          description: Only a pending invitation can be revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /namespace-invitations/pending:
    get:
      tags: [Namespaces]
      operationId: listPendingNamespaceInvitations
      summary: List pending namespace invitations addressed to the current user
      description: Requires a verified user account.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Pending invitations for this account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NamespaceInvitation"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /namespace-invitations/{token}/accept:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Namespaces]
      operationId: acceptNamespaceInvitation
      summary: Accept a namespace invitation — transfers your account into that namespace
      description: |
        Requires a verified user account, and the invitation must be
        addressed to that same account.

        **Side effects:**
        - Updates the caller's `tenant_id`/`app_role` in place (does not
          create a second account).
        - Drops stale tree memberships from the old namespace and grants the
          new namespace's globally-shared trees.
        - Marks the invitation `ACCEPTED`.
        - Revokes all of the caller's refresh tokens/sessions — the JWT's
          `tid`/`role` claims are now stale, so this forces a re-login
          everywhere.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string, format: uuid }
                  app_role: { type: string, enum: [ADMIN, STANDARD, AUDITOR] }
        "400":
          description: Invitation is no longer pending, or has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: This invitation was addressed to a different account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/404NotFound"

# ============================================================
# USER GROUPS (Admin)
# ============================================================

  /admin/user-groups:
    get:
      tags: [Admin, User Groups]
      operationId: listUserGroups
      summary: List user groups in the tenant, paginated and searchable
      description: Requires `ADMIN` app role.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
      responses:
        "200":
          description: Paginated user group list
          content:
            application/json:
              schema:
                type: object
                required: [total, items, page, page_size, total_pages]
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserGroup"
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Admin, User Groups]
      operationId: createUserGroup
      summary: Create a user group
      description: Requires `ADMIN` app role. `name` must be unique within the tenant.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 255 }
                description: { type: string, maxLength: 500, nullable: true }
      responses:
        "201":
          description: User group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroup"
        "409":
          description: A user group with this name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/user-groups/{groupId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Admin, User Groups]
      operationId: updateUserGroup
      summary: Rename or redescribe a user group
      description: Requires `ADMIN` app role. All body fields are optional.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 255 }
                description: { type: string, maxLength: 500, nullable: true }
      responses:
        "200":
          description: Updated user group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Admin, User Groups]
      operationId: deleteUserGroup
      summary: Delete a user group and revoke any access it was granting
      description: |
        Requires `ADMIN` app role.

        **Side effects:** cascades deletion of its memberships and any
        permission-group links; for each former member, revokes tree access
        that was only being granted through this group (unless they're still
        entitled through some other permission group).
      security:
        - BearerAuth: []
      responses:
        "204":
          description: User group deleted — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/user-groups/{groupId}/members:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Admin, User Groups]
      operationId: listUserGroupMembers
      summary: List members of a user group
      description: Requires `ADMIN` app role.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Group members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupMember"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      tags: [Admin, User Groups]
      operationId: addUserGroupMember
      summary: Add a user to a user group
      description: |
        Requires `ADMIN` app role. The user must belong to the caller's tenant.

        **Side effects:** immediately grants the user access to every tree
        implied by any permission group this user group is linked to.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: string, format: uuid }
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"
        "404":
          description: User group not found, or user not found in this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User is already in this group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/user-groups/{groupId}/members/{memberId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: memberId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Admin, User Groups]
      operationId: removeUserGroupMember
      summary: Remove a user from a user group
      description: |
        Requires `ADMIN` app role.

        **Side effects:** revokes the user's tree access that was granted
        through this group, unless they're still entitled through some
        other permission group.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Member removed — no body
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/user-groups/{groupId}/bulk-role:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Admin, User Groups]
      operationId: bulkAssignUserGroupRole
      summary: Set the app role for every member of a user group at once
      description: |
        Requires `ADMIN` app role.

        The caller's own account is never changed even if they're a member
        of the group (self-protection, same as the single-user endpoint).
        Granting `SUPER_ADMIN` requires the caller already be a
        `SUPER_ADMIN` → `403` otherwise.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_role]
              properties:
                app_role:
                  type: string
                  enum: [ADMIN, STANDARD, AUDITOR, SUPER_ADMIN]
      responses:
        "200":
          description: Bulk role update result
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated_count: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: Only a Super Administrator can grant Super Admin access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

