  # ============================================================
  # SEARCH
  # ============================================================

  /search/persons:
    get:
      tags: [Search]
      operationId: searchPersons
      summary: Full-text and fuzzy person search within the caller's trees
      description: >
        Searches across all trees the calling user has access to.
        Accepts a free-form query (full-text + trigram fuzzy) and optional structured filters.
        Persons marked PRIVATE are excluded unless the caller is an ADMIN or the tree owner.
        Living persons have their birth details redacted in results unless privacyLevel is PUBLIC.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 200
          description: >
            Search query — matched against given name, surname, nickname, full name.
            Supports fuzzy matching (typo-tolerant).
        - name: treeId
          in: query
          schema:
            type: string
            format: uuid
          description: Limit search to a specific tree
        - name: sex
          in: query
          schema:
            $ref: "#/components/schemas/PersonSex"
        - name: birthYearFrom
          in: query
          schema:
            type: integer
        - name: birthYearTo
          in: query
          schema:
            type: integer
        - name: deathYearFrom
          in: query
          schema:
            type: integer
        - name: deathYearTo
          in: query
          schema:
            type: integer
        - name: birthPlace
          in: query
          schema:
            type: string
          description: Fuzzy place name filter on birth event
        - name: isLiving
          in: query
          schema:
            type: boolean
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Search results ranked by relevance
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination, query]
                properties:
                  query:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PersonSearchResult"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "400":
          description: Query too short or malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /search/places:
    get:
      tags: [Search]
      operationId: searchPlaces
      summary: Fuzzy place name search with optional geo-bias
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: countryCode
          in: query
          schema:
            type: string
            pattern: "^[A-Z]{2}$"
        - name: latitude
          in: query
          schema:
            type: number
            format: double
          description: Geo-bias centre latitude
        - name: longitude
          in: query
          schema:
            type: number
            format: double
          description: Geo-bias centre longitude
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Matching places
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Place"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /search/global:
    get:
      tags: [Search]
      operationId: globalSearch
      summary: Cross-entity global search (persons, trees, places, events)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 200
        - name: types
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [person, tree, place, event]
            default: [person, tree, place]
          style: form
          explode: false
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Global search results grouped by entity type
          content:
            application/json:
              schema:
                type: object
                properties:
                  persons:
                    type: array
                    items:
                      $ref: "#/components/schemas/PersonSearchResult"
                  trees:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tree"
                  places:
                    type: array
                    items:
                      $ref: "#/components/schemas/Place"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  # ============================================================
  # HEALTH / META
  # ============================================================

  /health:
    get:
      tags: []
      operationId: healthCheck
      summary: API health check
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  version:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        "503":
          description: API is unhealthy

  # ============================================================
  # ADMIN — User management (ADMIN app_role required)
  # ============================================================

  /admin/users:
    get:
      tags: [Admin]
      operationId: listUsers
      summary: List all users in the tenant
      description: |
        Returns a paginated list of users. Requires `ADMIN` app role with a
        verified email address.

        A regular `ADMIN` stays scoped to their own namespace and never sees
        `SUPER_ADMIN` accounts. A `SUPER_ADMIN` instead sees users across
        **every** namespace by default (each item's `namespace` field is
        populated), optionally narrowed to one namespace via `namespace_id`.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 25 }
        - name: search
          in: query
          schema: { type: string, maxLength: 200 }
          description: >
            Search by name or email (case-insensitive). For a Super Admin,
            also matches the namespace's name/slug.
        - name: app_role
          in: query
          schema:
            type: string
            enum: [ADMIN, STANDARD, AUDITOR]
        - name: verified
          in: query
          schema: { type: boolean }
          description: Filter by email verification status
        - name: namespace_id
          in: query
          schema: { type: string, format: uuid }
          description: Super Admin only — filter to one namespace.
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at_desc, created_at_asc, name_asc, email_asc, last_login_desc]
            default: created_at_desc
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                required: [total, items, page, page_size, total_pages]
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
                  page: { type: integer }
                  page_size: { type: integer }
                  total_pages: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

    post:
      tags: [Admin]
      operationId: createUser
      summary: Create a new user and send an activation email
      description: |
        Creates a user in the tenant with a random unusable password.
        Sends an activation email containing a link to `POST /auth/reset-password`
        where the user sets their own password. Email is unique across every
        namespace — an account belongs to exactly one namespace at a time.

        **Side effects:**
        - Activation email sent immediately.
        - Activity log entry created: `event_type = ADMIN_CREATE`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, given_name]
              properties:
                email:
                  type: string
                  format: email
                given_name:
                  type: string
                  minLength: 1
                  maxLength: 100
                family_name:
                  type: string
                  maxLength: 100
                  default: ""
                app_role:
                  type: string
                  enum: [ADMIN, STANDARD, AUDITOR]
                  default: STANDARD
                namespace_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: >
                    Super Admin only — create the user in this namespace
                    instead of the caller's own. Ignored for a regular ADMIN,
                    who can only create users in their own namespace.
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "409":
          description: Email already exists in tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    patch:
      tags: [Admin]
      operationId: updateUser
      summary: Update a user's profile, role, or verification status
      description: |
        Partial update — all body fields are optional.

        **Verification change side effects:**
        - `email_verified = true` → sends "account verified" email, logs `ADMIN_VERIFY`.
        - `email_verified = false` → sends "verification removed" email, logs `ADMIN_UNVERIFY`.

        **Activation/deactivation via this endpoint:**
        - `is_active = true` → logs `ADMIN_ACTIVATE`.
        - `is_active = false` → logs `ADMIN_DEACTIVATE`.
        - Name/role-only changes → logs `ADMIN_UPDATE`.

        **Self-protection** (when `userId` equals the caller's own ID):
        - Cannot change own `app_role` away from `ADMIN` → `400`.
        - Cannot set own `is_active = false` → `400`.
        - Cannot set own `email_verified = false` → `400`.
        - Name changes are always allowed.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                given_name:
                  type: string
                  maxLength: 100
                  nullable: true
                family_name:
                  type: string
                  maxLength: 100
                  nullable: true
                app_role:
                  type: string
                  enum: [ADMIN, STANDARD, AUDITOR]
                is_active:
                  type: boolean
                email_verified:
                  type: boolean
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: |
            Self-protection rule violated (e.g. cannot change own role or
            deactivate own account).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      tags: [Admin]
      operationId: deactivateUser
      summary: Deactivate (soft-delete) a user
      description: |
        Sets `is_active = false` and immediately revokes all of the user's
        active refresh tokens (forcing sign-out on all devices).

        **Side effects:**
        - "Your account has been deactivated" email sent to the user.
        - Activity log entry created: `event_type = ADMIN_DEACTIVATE`.

        **Self-protection:** Cannot deactivate your own account → `400`.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: User deactivated — no body
        "400":
          description: Cannot deactivate your own account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/users/{userId}/verify:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Admin]
      operationId: adminVerifyUser
      summary: Manually verify a user's email address
      description: |
        Marks `email_verified = true` without requiring the user to click an
        email link.

        **Side effects:**
        - "Your account is verified" email sent with a sign-in link.
        - Activity log entry created: `event_type = ADMIN_VERIFY`.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /admin/users/{userId}/purge:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Admin]
      operationId: purgeUser
      summary: Permanently delete a deactivated user (Super Admin only)
      description: |
        Hard-deletes the user row. Unlike `DELETE /admin/users/{userId}`
        (deactivate), this is irreversible — the account cannot be
        recovered afterwards.

        **Requires `SUPER_ADMIN` app role** — a regular `ADMIN` gets `403`.

        **Preconditions:**
        - The target user must already be deactivated (`is_active = false`).
          Purging an active account → `400`. Deactivate first via
          `DELETE /admin/users/{userId}` or `PATCH /admin/users/{userId}`.
        - Cannot purge your own account → `400`.

        **Side effects:**
        - All of the user's refresh tokens/sessions are revoked.
        - Activity log entry created: `event_type = ADMIN_DELETE`, recorded
          against the acting Super Admin and identifying the deleted user's
          email, role, and id — this entry is retained after the user row
          is gone (it does not cascade-delete).
      security:
        - BearerAuth: []
      responses:
        "204":
          description: User permanently deleted — no body
        "400":
          description: >
            Either the target account is still active (must be deactivated
            first), or the caller tried to purge their own account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: Caller is not a Super Admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/merge:
    post:
      tags: [Trees]
      operationId: mergeTrees
      summary: Merge multiple family trees into one new tree
      description: |
        **Admin only.** Creates a new family tree by merging two or more existing
        trees. Each source tree contributes a "pivot person" — a real-world person
        who appears in multiple trees. All pivot persons are collapsed into a single
        person in the resulting tree; every other person is copied with a new ID.

        Family groups are rewritten to use the new person IDs. Photo URL references
        are preserved. The calling admin becomes OWNER of the merged tree; source
        trees are left untouched.

        A `MERGE_TREES` audit log entry is written to the new tree.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_tree_name, sources]
              properties:
                new_tree_name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: Combined Shah Family
                new_tree_description:
                  type: string
                  maxLength: 1000
                  nullable: true
                sources:
                  type: array
                  minItems: 2
                  description: At least two source trees with their pivot persons.
                  items:
                    type: object
                    required: [tree_id, pivot_person_id]
                    properties:
                      tree_id:
                        type: string
                        format: uuid
                      pivot_person_id:
                        type: string
                        format: uuid
                        description: ID of the person in this tree who represents the shared real-world ancestor.
      responses:
        "201":
          description: Merged tree created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tree_id:    { type: string, format: uuid }
                  tree_name:  { type: string }
                  person_count: { type: integer }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          description: One of the source trees or pivot persons was not found
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /admin/trees/{treeId}/persons:
    parameters:
      - name: treeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Tree whose persons to list
    get:
      tags: [Admin]
      operationId: adminListTreePersons
      summary: List persons in a tree (for admin tooling)
      description: |
        Returns a lightweight list of all non-deleted persons in the given tree,
        scoped to the admin's tenant. Intended for dropdown / picker UIs such as
        the "Merge Trees" pivot-person selector in the Admin Dashboard.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Person list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:                   { type: string, format: uuid }
                    display_given_name:   { type: string }
                    display_surname:      { type: string }
                    photo_url:            { type: string, nullable: true }
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

# ============================================================
# AdminUser schema now lives in components/schemas (see NamespaceSummary
# / Namespaces subsystem block) — it's referenced by the admin endpoints above.
