              schema:
                $ref: "#/components/schemas/Tree"
        "400":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/401Unauthorized"

  /trees/{treeId}/export:
    post:
      tags: [Trees]
      operationId: exportTree
      summary: Enqueue a tree export job
      parameters:
        - $ref: "#/components/parameters/treeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                format:
                  type: string
                  enum: [GEDCOM_551, GEDCOM_70, PDF_PEDIGREE, PDF_FAMILY_BOOK, CSV, JSON]
                options:
                  type: object
                  properties:
                    includeMedia:
                      type: boolean
                      default: false
                    privacyFilter:
                      $ref: "#/components/schemas/PrivacyLevel"
                      description: Exclude persons with stricter privacy level
      responses:
        "202":
          description: Export job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportJob"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"

  /trees/{treeId}/export/{jobId}:
    get:
      tags: [Trees]
      operationId: getExportJob
      summary: Poll export job status and retrieve download URL when complete
      parameters:
        - $ref: "#/components/parameters/treeId"
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Export job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportJob"
        "404":
          $ref: "#/components/responses/404NotFound"

  /trees/{treeId}/import:
    post:
      tags: [Trees]
      operationId: importTree
      summary: Upload a GEDCOM or other file and enqueue an import job
      parameters:
        - $ref: "#/components/parameters/treeId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, format]
              properties:
                file:
                  type: string
                  format: binary
                  description: Max 50 MB
                format:
                  type: string
                  enum: [GEDCOM_551, GEDCOM_70, CSV, JSON]
      responses:
        "202":
          description: Import job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJob"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "413":
          description: File too large (max 50 MB)

  /trees/{treeId}/import/{jobId}:
