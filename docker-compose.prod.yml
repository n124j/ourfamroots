# Production stack — single VM (GCP e2-micro: 1 vCPU, 1 GB RAM, 30 GB disk)
#
# All services run on one machine.  Resource limits are tuned for the
# GCP free-tier e2-micro instance.
#
# Usage:
#   1. Copy .env.prod.example → .env.prod  and fill in secrets
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# First-time TLS:
#   The proxy starts on port 80 with a self-signed fallback.
#   Run the certbot service once to obtain a real Let's Encrypt certificate:
#     docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm certbot
#   Then reload the proxy:
#     docker compose -f docker-compose.prod.yml --env-file .env.prod exec proxy nginx -s reload

name: ourfamroots-prod

# ── Shared anchors ──────────────────────────────────────────────────────────

x-backend-env: &backend-env
    PYTHONPATH: /app
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ourfamroots}
    SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ourfamroots}
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ENVIRONMENT: production
    APP_ENV: production
    LOG_LEVEL: INFO
    DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-}
    DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-ourfamroots-system}
    S3_BUCKET: ${S3_BUCKET:-ourfamroots-media}
    S3_REGION: ${S3_REGION:-us-east-1}
    S3_ENDPOINT_URL: http://minio:9000
    S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://${DOMAIN}/s3}
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    CORS_ORIGINS: ${CORS_ORIGINS}
    SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
    SMTP_PORT: ${SMTP_PORT:-587}
    SMTP_USER: ${SMTP_USER}
    SMTP_PASSWORD: ${SMTP_PASSWORD}
    EMAIL_FROM: ${EMAIL_FROM}
    FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
    API_BASE_URL: ${API_BASE_URL}
    GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
    GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
    SENTRY_DSN: ${SENTRY_DSN:-}
    VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL:-}

x-restart: &restart
    restart: unless-stopped
    logging:
        driver: json-file
        options:
            max-size: '5m'
            max-file: '3'

services:
    # ── Reverse proxy (TLS termination + routing) ─────────────────────────────
    proxy:
        image: nginx:1.27-alpine
        <<: *restart
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./infra/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
            - ./certbot/webroot:/var/www/certbot:ro
            - ./certbot/conf:/etc/letsencrypt:ro
        depends_on:
            frontend:
                condition: service_healthy
            api:
                condition: service_healthy
        deploy:
            resources:
                limits: {memory: 32M}

    # ── Let's Encrypt certificate manager ──────────────────────────────────────
    # Run once:  docker compose ... run --rm certbot
    # Auto-renew via the renew-certs service below.
    certbot:
        image: certbot/certbot:latest
        volumes:
            - ./certbot/webroot:/var/www/certbot
            - ./certbot/conf:/etc/letsencrypt
        entrypoint: >
            sh -c "
              certbot certonly --webroot -w /var/www/certbot
                --email ${CERTBOT_EMAIL}
                --agree-tos --no-eff-email
                -d ${DOMAIN}
                --force-renewal
            "
        profiles: ['certbot']

    # Cron-style renewal — runs certbot renew every 12 hours
    renew-certs:
        image: certbot/certbot:latest
        <<: *restart
        volumes:
            - ./certbot/webroot:/var/www/certbot
            - ./certbot/conf:/etc/letsencrypt
        entrypoint: sh -c "while :; do certbot renew --quiet; sleep 43200; done"
        deploy:
            resources:
                limits: {memory: 32M}

    # ── PostgreSQL ─────────────────────────────────────────────────────────────
    db:
        image: postgres:15-alpine
        <<: *restart
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-ourfamroots}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        command:
            - postgres
            - -c
            - shared_buffers=64MB
            - -c
            - work_mem=4MB
            - -c
            - effective_cache_size=256MB
            - -c
            - max_connections=50
            - -c
            - wal_buffers=4MB
            - -c
            - checkpoint_completion_target=0.9
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres}']
            interval: 10s
            timeout: 3s
            retries: 5
        deploy:
            resources:
                limits: {memory: 192M}

    # ── Redis ──────────────────────────────────────────────────────────────────
    redis:
        image: redis:7-alpine
        <<: *restart
        command: >
            redis-server
              --requirepass ${REDIS_PASSWORD}
              --appendonly yes
              --maxmemory 48mb
              --maxmemory-policy allkeys-lru
              --save 900 1
              --save 300 10
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
            interval: 10s
            timeout: 3s
            retries: 5
        deploy:
            resources:
                limits: {memory: 64M}

    # ── MinIO (S3-compatible object storage) ───────────────────────────────────
    minio:
        image: minio/minio:RELEASE.2024-05-01T01-11-10Z
        <<: *restart
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        volumes:
            - minio_data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 15s
            timeout: 5s
            retries: 5
        deploy:
            resources:
                limits: {memory: 192M}

    # MinIO bucket initializer (runs once then exits)
    minio-init:
        image: minio/mc:RELEASE.2024-05-09T17-04-24Z
        depends_on:
            minio:
                condition: service_healthy
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
            S3_BUCKET: ${S3_BUCKET:-ourfamroots-media}
        entrypoint: >
            /bin/sh -c "
              mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
              mc mb --ignore-existing local/$$S3_BUCKET;
              mc anonymous set download local/$$S3_BUCKET;
            "
        restart: 'no'

    # ── DB migration runner (one-shot) ─────────────────────────────────────────
    migrate:
        build:
            context: ./backend
            target: runtime
        environment: *backend-env
        command: alembic upgrade head
        depends_on:
            db:
                condition: service_healthy
        restart: 'no'
        deploy:
            resources:
                limits: {memory: 128M}

    # ── Backend API ────────────────────────────────────────────────────────────
    api:
        build:
            context: ./backend
            target: runtime
        <<: *restart
        environment: *backend-env
        command: >
            uvicorn src.main:app
              --host 0.0.0.0
              --port 8000
              --workers 1
              --loop uvloop
              --http httptools
              --proxy-headers
              --forwarded-allow-ips "*"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 15s
        deploy:
            resources:
                limits: {memory: 384M}

    # ── Celery worker ──────────────────────────────────────────────────────────
    worker:
        build:
            context: ./backend
            dockerfile: Dockerfile.worker
        <<: *restart
        environment: *backend-env
        command: >
            celery -A src.infrastructure.media.celery_app worker
              --loglevel=info
              --queues=media,default
              --concurrency=1
              --max-tasks-per-child=25
              --hostname=worker@%h
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits: {memory: 128M}

    # ── Frontend (pre-built static assets via Nginx) ───────────────────────────
    frontend:
        build:
            context: ./frontend
            args:
                VITE_API_BASE_URL: /api/v1
                GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
                GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
        <<: *restart
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/health']
            interval: 15s
            timeout: 3s
            retries: 5
            start_period: 30s
        deploy:
            resources:
                limits: {memory: 32M}

volumes:
    postgres_data:
    redis_data:
    minio_data:
